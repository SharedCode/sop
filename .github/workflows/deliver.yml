# Continuous delivery pipeline:
#
#   commit -> build -> tests -> package -> staging -> [approval] -> prod
#           |______CI______|   (GHCR)     (smoke)     (button)     (promote + site)
#
# The production environment requires a manual approval, so every commit
# lands prod-ready and a human presses the button. Remove the environment
# protection rule to turn this into continuous deployment.
name: Deliver

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./inmemory/... ./btree/... ./examples/quickstart
      - run: go build ./inmemory/... ./btree/... ./examples/quickstart

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./inmemory ./btree -count=1 -v 2>&1 | tail -20

  package:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sop-quickstart" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -f Dockerfile.quickstart -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}

  staging:
    needs: package
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      packages: read
    steps:
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sop-quickstart" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test the packaged image
        run: |
          docker run --rm $IMAGE:${{ github.sha }} | tee out.txt
          grep -q "quickstart: OK" out.txt

  prod:
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      packages: write
      pages: write
      id-token: write
    steps:
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sop-quickstart" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote image to stable
        run: |
          docker pull $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:stable
          docker push $IMAGE:stable
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v4
