<script>
    function showStoreDetails() {
        // Redirect to Edit Store (which now handles Read-Only/Edit hybrid view)
        showEditStore(true);
    }

    /* 
    function showStoreDetails_OLD() {
        // ... (Old logic commented out)
    }
    */

    function isEqual(a, b) {
        return false;
    }

    let storeActionInFlight = false;

    function beginStoreAction(button, busyLabel) {
        if (storeActionInFlight) return false;
        storeActionInFlight = true;
        if (button) {
            button.dataset.originalText = button.textContent;
            button.textContent = busyLabel;
            button.disabled = true;
        }
        return true;
    }

    function endStoreAction(button) {
        storeActionInFlight = false;
        if (button) {
            button.disabled = false;
            button.textContent = button.dataset.originalText || button.textContent;
        }
    }

    window.beginStoreAction = beginStoreAction;
    window.endStoreAction = endStoreAction;

    function updateStore() {
        const saveBtn = document.querySelector('#add-store-modal .modal-footer .btn-success');
        console.log('[updateStore] start', {
            store: document.getElementById('new-store-name')?.value || '',
            database: currentDatabase,
            buttonLabel: saveBtn?.textContent || ''
        });
        if (!beginStoreAction(saveBtn, 'Updating...')) return;

        const name = document.getElementById('new-store-name').value.trim();
        const desc = document.getElementById('new-store-description').value.trim();
        const celExpression = document.getElementById('cel-expression-value').value;
        
        const type = document.getElementById('new-store-key-type').value;
        let indexSpec = null;
        if (type === 'map') {
            indexSpec = generateIndexSpecJSON();
        }

        const currentSlotLength = Number.isFinite(currentStoreInfo?.slotLength) ? currentStoreInfo.slotLength : 2000;
        let slotLength = parseInt(document.getElementById('new-store-slot-length').value, 10);
        if (!Number.isFinite(slotLength) || slotLength <= 0) {
            slotLength = currentSlotLength;
        }

        const currentIsUnique = typeof currentStoreInfo?.isUnique === 'boolean' ? currentStoreInfo.isUnique : true;
        let isUnique = document.getElementById('new-store-is-unique').checked;
        if (typeof isUnique !== 'boolean') {
            isUnique = currentIsUnique;
        }

        const currentDataSize = (() => {
            if (Number.isFinite(currentStoreInfo?.dataSize)) return currentStoreInfo.dataSize;
            if (currentStoreInfo?.isValueActivelyPersisted) return 2;
            if (currentStoreInfo?.isValueInNode) return 0;
            return 1;
        })();
        let dataSize = parseInt(document.getElementById('new-store-data-size').value, 10);
        if (!Number.isFinite(dataSize)) {
            dataSize = currentDataSize;
        }
        
        let cacheDuration = parseInt(document.getElementById('new-store-cache-duration').value);
        if (isNaN(cacheDuration)) cacheDuration = 0;
        let isCacheTTL = document.getElementById('new-store-cache-ttl').checked;

        // If Data Size is Small (0) or Big (2), cache settings are not applicable/hidden.
        if (dataSize !== 1) {
            cacheDuration = 0;
            isCacheTTL = false;
        }

        // Seed Data (Only if visible/empty)
        let seedKey = null;
        let seedValue = null;
        const seedContainer = document.getElementById('seed-data-container');
        
        // Collect Relations. Prefer the live UI rows, but fall back to the current
        // store metadata when the select elements have not populated yet.
        const uiRelations = getRelationshipsFromUI();
        const fallbackRelations = Array.isArray(currentStoreInfo?.relations) ? currentStoreInfo.relations : [];
        const hasUsableUiRelations = uiRelations.length > 0 && uiRelations.every(rel =>
            rel?.target_store && Array.isArray(rel.target_fields) && rel.target_fields.length > 0
        );
        const relations = hasUsableUiRelations ? uiRelations : fallbackRelations;

        if (seedContainer.style.display !== 'none') {
             // Reuse logic from saveNewStore (simplified duplication for now)
             if (type === 'map') {
                ensureMapKeySeedRow();
                const rows = document.querySelectorAll('.key-field-row');
                if (rows.length > 0) {
                    seedKey = {};
                    rows.forEach(row => {
                        const name = row.querySelector('.key-field-name').value.trim();
                        if (!name) return;
                        const valStr = row.querySelector('.key-field-value').value;
                        const fieldType = row.querySelector('.key-field-type').value;
                        let val = valStr;
                        if (['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'uint8', 'uint16', 'uint32', 'uint64', 'rune'].includes(fieldType)) {
                            val = parseInt(valStr); if (isNaN(val)) val = 0;
                        } else if (['float32', 'float64', 'decimal'].includes(fieldType)) {
                            val = parseFloat(valStr); if (isNaN(val)) val = 0.0;
                        } else if (fieldType === 'bool') {
                            val = (valStr.toLowerCase() === 'true' || valStr === '1');
                        }
                        seedKey[name] = val;
                    });
                }
             } else {
                 const seedKeyStr = document.getElementById('new-store-seed-key').value.trim();
                 if (seedKeyStr) {
                     seedKey = seedKeyStr;
                     // Parse based on selected Key Type to ensure backend receives correct type
                     if (['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'uint8', 'uint16', 'uint32', 'uint64', 'rune'].includes(type)) {
                         const n = parseInt(seedKeyStr);
                         if (!isNaN(n)) seedKey = n;
                     } else if (['float32', 'float64', 'decimal'].includes(type)) {
                         const n = parseFloat(seedKeyStr);
                         if (!isNaN(n)) seedKey = n;
                     } else if (type === 'bool') {
                         seedKey = (seedKeyStr.toLowerCase() === 'true' || seedKeyStr === '1');
                     }
                 }
             }
             
             try {
                seedValue = generateSeedValueJSON();
             } catch (e) {
                showAlert(e.message);
                return;
             }
        }

        const keyFieldRows = Array.from(document.querySelectorAll('.key-field-row'));
        const valueType = document.getElementById('new-store-value-type')?.value || 'string';
        const isStructValue = valueType === 'map';
        const valueFieldRows = isStructValue
            ? Array.from(document.querySelectorAll('.value-field-row')).filter(row => {
                const style = window.getComputedStyle(row);
                return style.display !== 'none' && style.visibility !== 'hidden';
            })
            : [];
        const keyFields = [];
        const valueFields = [];
        const schema = {};

        keyFieldRows.forEach(row => {
            const name = row.querySelector('.key-field-name')?.value?.trim() || '';
            if (!name) return;
            keyFields.push(name);
            schema[name] = row.querySelector('.key-field-type')?.value || 'string';
        });

        if (isStructValue) {
            valueFieldRows.forEach(row => {
                const name = row.querySelector('.value-field-name')?.value?.trim() || '';
                if (!name) return;
                valueFields.push(name);
                schema[name] = row.querySelector('.value-field-type')?.value || 'string';
            });
        }

        const payload = {
            database: currentDatabase,
            storeName: name,
            description: desc,
            keyType: type,
            valueType: document.getElementById('new-store-value-type').value,
            schema: schema,
            keyFields: keyFields,
            valueFields: valueFields,
            celExpression: celExpression,
            indexSpec: indexSpec,
            slotLength: slotLength,
            isUnique: isUnique,
            dataSize: dataSize,
            cacheDuration: cacheDuration,
            isCacheTTL: isCacheTTL,
            seedKey: seedKey,
            seedValue: seedValue,
            relations: relations
        };

        try {
            console.log('[updateStore] sending payload', payload);
            const data = apiCallSync('/api/store/update', 'POST', payload);
            console.log('[updateStore] response', data);
            if (!data) return;
            closeAddStoreModal();
            selectDatabase(currentDatabase, true, name);
            if (data.warning) {
                showAlert('Store updated successfully.\n\nWARNING: ' + data.warning);
            } else {
                showAlert('Store updated successfully.');
            }
        } catch (err) {
            console.error(err);
        } finally {
            endStoreAction(saveBtn);
        }
    }

    function resetStoreFormState() {
        const valueMapContainer = document.getElementById('value-map-spec-container');
        if (valueMapContainer) {
            valueMapContainer.style.display = 'none';
            valueMapContainer.querySelectorAll('button.add-val-btn').forEach(btn => btn.remove());
        }

        const seedBuilder = document.getElementById('seed-value-builder');
        if (seedBuilder) {
            seedBuilder.style.display = 'none';
        }

        const seedValueSimple = document.getElementById('new-store-seed-value-simple');
        if (seedValueSimple) {
            seedValueSimple.style.display = 'block';
            seedValueSimple.disabled = false;
        }

        const seedValueRaw = document.getElementById('new-store-seed-value');
        if (seedValueRaw) {
            seedValueRaw.style.display = 'none';
            seedValueRaw.disabled = false;
        }

        const seedKeyInput = document.getElementById('new-store-seed-key');
        if (seedKeyInput) {
            seedKeyInput.disabled = false;
        }

        const seedRawMode = document.getElementById('seed-value-raw-mode');
        if (seedRawMode) {
            seedRawMode.disabled = false;
        }

        const rawMode = document.getElementById('seed-value-raw-mode');
        if (rawMode) rawMode.checked = false;

        const valueMapFields = document.getElementById('value-map-fields-list');
        if (valueMapFields) valueMapFields.innerHTML = '';

        const seedFields = document.getElementById('seed-value-fields-list');
        if (seedFields) seedFields.innerHTML = '';

        ['seed-data-container', 'seed-key-container', 'value-map-spec-container', 'index-spec-container'].forEach(id => {
            const container = document.getElementById(id);
            if (container) {
                container.querySelectorAll('input, select, textarea, button').forEach(el => {
                    el.disabled = false;
                    el.removeAttribute('readonly');
                });
            }
        });

        const keyFields = document.getElementById('key-fields-list');
        if (keyFields) keyFields.innerHTML = '';

        const indexFields = document.getElementById('index-fields-list');
        if (indexFields) indexFields.innerHTML = '';
    }

    function showAddStore() {
        window.currentStoreFormMode = 'add';
        window.currentStoreInfo = null;
        window.currentAdminCredentials = null;

        const modal = document.getElementById('add-store-modal');
        if (modal) modal.dataset.formMode = 'add';

        resetStoreFormState();
        
        // Fetch stores for potential relationships
        fetchRelationStores();

        openUIModal('add-store-modal');
        document.querySelector('#add-store-modal .modal-header span').textContent = 'Add New Store';

        // populate EC targets
        const targetSelect = document.getElementById('new-store-target-ec');
        if (targetSelect) {
            targetSelect.innerHTML = '<option value="">Default("")</option>';
            targetSelect.disabled = false;

            if (currentDatabase) {
                 apiCall(`/api/db/options?database=${encodeURIComponent(currentDatabase)}`)
                    .then(opts => {
                        if (opts?.erasure_config && targetSelect.isConnected) {
                            Object.keys(opts.erasure_config).forEach(key => {
                                 // Skip empty key as it doubles with Default if logic overlaps,
                                 // but explicit empty key in config is valid.
                                 if (key === "") return;

                                 const opt = document.createElement('option');
                                 opt.value = key;
                                 opt.textContent = key;
                                 targetSelect.appendChild(opt);
                            });
                        }
                    })
                    .catch(console.error);
            }
        } else {
            console.warn('showAddStore: target select element not found');
        }

        // Reset Button
        const footer = document.querySelector('#add-store-modal .modal-footer');
        const saveBtn = footer?.querySelector('.btn-success');
        if (saveBtn) {
            saveBtn.removeAttribute('onclick');
            saveBtn.dataset.storeAction = 'add';
            saveBtn.textContent = 'Add';
            saveBtn.onclick = function (evt) {
                evt.preventDefault();
                evt.stopPropagation();
                return saveNewStore();
            };
            saveBtn.disabled = false;
        }

        // Reset Basic Fields
        document.getElementById('new-store-name').value = '';
        document.getElementById('new-store-name').disabled = false;
        document.getElementById('new-store-description').value = '';
        document.getElementById('new-store-description').disabled = false;
        document.getElementById('relationship-list').innerHTML = ''; // Clear relationships

        // Reset Key Type
        const keyTypeSelect = document.getElementById('new-store-key-type');
        if (keyTypeSelect) {
            keyTypeSelect.value = 'string';
            keyTypeSelect.disabled = false;
        }
        const keyArrayBox = document.getElementById('new-store-key-is-array');
        if (keyArrayBox) {
            keyArrayBox.checked = false;
            keyArrayBox.disabled = false;
        }

        // Reset Value Type
        const valueTypeSelect = document.getElementById('new-store-value-type');
        if (valueTypeSelect) {
            valueTypeSelect.value = 'string';
            valueTypeSelect.disabled = false;
        }
        const valueArrayBox = document.getElementById('new-store-value-is-array');
        if (valueArrayBox) {
            valueArrayBox.checked = false;
            valueArrayBox.disabled = false;
        }

        // Reset CEL
        const celValue = document.getElementById('cel-expression-value');
        if (celValue) {
            celValue.value = '';
            celValue.disabled = false;
        }
        const celEditBtn = document.querySelector('#new-store-cel-expression button');
        if (celEditBtn) celEditBtn.disabled = false;

        // Reset Advanced Mode
        const advancedModeToggle = document.getElementById('new-store-advanced-mode');
        if (advancedModeToggle) {
            advancedModeToggle.checked = false;
            advancedModeToggle.disabled = false;
        }
        toggleAdvancedOptions();

        // Reset Advanced Fields
        const slotLengthInput = document.getElementById('new-store-slot-length');
        if (slotLengthInput) {
            slotLengthInput.value = 2000;
            slotLengthInput.disabled = false;
        }
        const uniqueBox = document.getElementById('new-store-is-unique');
        if (uniqueBox) {
            uniqueBox.checked = true;
            uniqueBox.disabled = false;
        }
        const dataSizeSelect = document.getElementById('new-store-data-size');
        if (dataSizeSelect) {
            dataSizeSelect.value = '0';
            dataSizeSelect.disabled = false;
        }

        const cacheDurationInput = document.getElementById('new-store-cache-duration');
        if (cacheDurationInput) {
            cacheDurationInput.value = 0;
            cacheDurationInput.disabled = false;
        }
        const streamingBox = document.getElementById('new-store-is-streaming');
        if (streamingBox) {
            streamingBox.checked = false;
            streamingBox.disabled = false;
        }
        
        toggleCacheOptions();

        // Clear Dynamic Lists (guard for older/partial DOM layouts)
        const keyFieldsList = document.getElementById('key-fields-list');
        if (keyFieldsList) keyFieldsList.innerHTML = '';
        const indexFieldsList = document.getElementById('index-fields-list');
        if (indexFieldsList) indexFieldsList.innerHTML = '';
        const valueMapFieldsList = document.getElementById('value-map-fields-list');
        if (valueMapFieldsList) valueMapFieldsList.innerHTML = '';
        const seedKeyFieldsList = document.getElementById('seed-key-fields-list');
        if (seedKeyFieldsList) seedKeyFieldsList.innerHTML = '';
        const seedValueFieldsList = document.getElementById('seed-value-fields-list');
        if (seedValueFieldsList) seedValueFieldsList.innerHTML = '';
        const valueMapContainer = document.getElementById('value-map-spec-container');
        if (valueMapContainer) {
            valueMapContainer.querySelectorAll('button.add-val-btn').forEach(btn => btn.remove());
        }

        // Reset Seed Data Inputs
        const seedKeyInput = document.getElementById('new-store-seed-key');
        if (seedKeyInput) {
            seedKeyInput.value = '';
            seedKeyInput.disabled = false;
        }
        const seedSimpleInput = document.getElementById('new-store-seed-value-simple');
        if (seedSimpleInput) {
            seedSimpleInput.value = '';
            seedSimpleInput.disabled = false;
        }
        const seedRawInput = document.getElementById('new-store-seed-value');
        if (seedRawInput) {
            seedRawInput.value = '';
            seedRawInput.disabled = false;
        }

        const seedDataContainer = document.getElementById('seed-data-container');
        if (seedDataContainer) seedDataContainer.style.display = 'block';
        const rawMode = document.getElementById('seed-value-raw-mode');
        if (rawMode) rawMode.checked = false;

        if (valueMapContainer) valueMapContainer.style.display = 'none';
        const indexSpecContainer = document.getElementById('index-spec-container');
        if (indexSpecContainer) indexSpecContainer.style.display = 'none';

        // Reset UI State
        toggleIndexSpec();

        if (typeof ensureValueMapAddButton === 'function') {
            ensureValueMapAddButton();
        }

        // Re-enable Add Buttons (in case they were disabled by Edit Store)
        refreshAddFieldButtons();
        
        // Hide Unlock Button
        const unlockBtn = document.getElementById('btn-unlock-admin');
        if (unlockBtn) unlockBtn.style.display = 'none';

        // Sync UI with reset values
        if (typeof toggleIndexSpec === 'function') toggleIndexSpec();
        if (typeof toggleValueSpec === 'function') toggleValueSpec();
    }

    function closeAddStoreModal() {
        window.currentStoreFormMode = 'view';
        resetStoreFormState();
        closeUIModal('add-store-modal');
        window.currentAdminCredentials = null;
        const unlockBtn = document.getElementById('btn-unlock-admin');
        if (unlockBtn) unlockBtn.style.display = 'none';
    }

    function ensureValueMapAddButton() {
        const valMapContainer = document.getElementById('value-map-spec-container');
        if (!valMapContainer) return;

        let addValBtn = valMapContainer.querySelector('button.add-val-btn');
        if (!addValBtn) {
            addValBtn = document.createElement('button');
            addValBtn.type = 'button';
            addValBtn.className = 'add-val-btn';
            addValBtn.textContent = '+ Add Field';
            addValBtn.onclick = () => addValueFieldRow();
            addValBtn.style.marginTop = '5px';
            addValBtn.style.fontSize = '11px';
            addValBtn.style.padding = '4px 8px';
            addValBtn.style.cursor = 'pointer';
            valMapContainer.appendChild(addValBtn);
        }

        addValBtn.disabled = false;
        addValBtn.style.display = 'inline-block';

        const label = valMapContainer.querySelector('label');
        if (label && label.textContent.includes('Read-Only')) {
            label.textContent = 'Value Map Fields';
        }
    }

    function refreshAddFieldButtons() {
        const keyBtn = document.querySelector('#index-spec-container button[onclick*="addKeyFieldRow"]');
        if (keyBtn) {
            keyBtn.onclick = () => addKeyFieldRow();
            keyBtn.disabled = false;
            keyBtn.style.pointerEvents = 'auto';
        }

        const indexBtn = document.querySelector('#index-spec-container button[onclick*="addIndexFieldRow"]');
        if (indexBtn) {
            indexBtn.onclick = () => addIndexFieldRow();
            indexBtn.disabled = false;
            indexBtn.style.pointerEvents = 'auto';
        }

        const seedBtn = document.querySelector('#seed-value-builder button');
        if (seedBtn && seedBtn.textContent.includes('Add Field')) {
            seedBtn.onclick = () => addSeedValueFieldRow();
            seedBtn.disabled = false;
            seedBtn.style.pointerEvents = 'auto';
        }

        const valueMapAddBtn = document.querySelector('#value-map-spec-container button.add-val-btn');
        if (valueMapAddBtn) {
            valueMapAddBtn.onclick = () => addValueFieldRow();
            valueMapAddBtn.disabled = false;
            valueMapAddBtn.style.pointerEvents = 'auto';
        }
    }

    function normalizeFieldType(type) {
        const normalized = String(type || 'string').toLowerCase();
        const aliases = {
            'number': 'float64',
            'integer': 'int',
            'int64': 'int64',
            'uint64': 'uint64',
            'boolean': 'bool',
            'bool': 'bool',
            'uuid': 'uuid',
            'guid': 'uuid',
            'object': 'map',
            'map': 'map',
            'array': 'blob',
            'list': 'blob'
        };
        return aliases[normalized] || normalized;
    }

    function hasSchemaMetadata(info) {
        const hasSchema = !!(info?.schema && typeof info.schema === 'object' && Object.keys(info.schema).length > 0);
        const hasKeyFields = Array.isArray(info?.keyFields) && info.keyFields.length > 0;
        const hasValueFields = Array.isArray(info?.valueFields) && info.valueFields.length > 0;
        const hasIndexSpec = !!(info?.indexSpec && typeof info.indexSpec === 'object' && Array.isArray(info.indexSpec.index_fields) && info.indexSpec.index_fields.length > 0);
        const hasRelations = Array.isArray(info?.relations) && info.relations.length > 0;
        return hasSchema || hasKeyFields || hasValueFields || hasIndexSpec || hasRelations;
    }

    function inferFieldTypeFromValue(value) {
        if (value === null || value === undefined) return 'string';

        if (typeof value === 'number') {
            return Number.isInteger(value) ? 'int' : 'float64';
        }

        if (typeof value === 'boolean') {
            return 'bool';
        }

        if (typeof value === 'string') {
            const trimmed = value.trim();
            if (/^(true|false)$/i.test(trimmed)) return 'bool';
            if (/^\d+$/.test(trimmed)) return 'int';
            if (/^\d+\.\d+(?:e[-+]?\d+)?$/i.test(trimmed)) return 'float64';
            if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(trimmed)) return 'uuid';
            if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return 'date';
            if (/^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2}(?::\d{2}(?:\.\d+)?)?(?:Z|[+-]\d{2}:?\d{2})?)$/.test(trimmed)) return 'datetime';
            return 'string';
        }

        if (Array.isArray(value)) {
            return 'blob';
        }

        if (typeof value === 'object') {
            return 'map';
        }

        return 'string';
    }

    function addValueFieldRow(name = '', type = 'string', value = '', readOnly = false) {
        const container = document.getElementById('value-map-fields-list');
        const normalizedType = normalizeFieldType(type);

        div.style.display = 'flex';
        div.style.gap = '5px';
        div.innerHTML = `

            <select class="value-field-type" onchange="const row = this.closest('.value-field-row'); const valueInput = row.querySelector('.value-field-value'); if (valueInput) valueInput.value = getDefaultFieldValue(this.value);" style="width: 100px; padding: 4px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color);" ${readOnly ? 'disabled' : ''}>
                <option value="string" ${normalizedType==='string'?'selected':''}>String</option>
                <option value="int" ${normalizedType==='int'?'selected':''}>Int</option>
                <option value="int8" ${normalizedType==='int8'?'selected':''}>Int8</option>
                <option value="int16" ${normalizedType==='int16'?'selected':''}>Int16</option>
                <option value="int32" ${normalizedType==='int32'?'selected':''}>Int32</option>
                <option value="int64" ${normalizedType==='int64'?'selected':''}>Int64</option>
                <option value="uint" ${normalizedType==='uint'?'selected':''}>Uint</option>
                <option value="uint8" ${normalizedType==='uint8'?'selected':''}>Uint8</option>
                <option value="uint16" ${normalizedType==='uint16'?'selected':''}>Uint16</option>
                <option value="uint32" ${normalizedType==='uint32'?'selected':''}>Uint32</option>
                <option value="uint64" ${normalizedType==='uint64'?'selected':''}>Uint64</option>
                <option value="float32" ${normalizedType==='float32'?'selected':''}>Float32</option>
                <option value="float64" ${normalizedType==='float64'?'selected':''}>Float64</option>
                <option value="complex64" ${normalizedType==='complex64'?'selected':''}>Complex64</option>
                <option value="complex128" ${normalizedType==='complex128'?'selected':''}>Complex128</option>
                <option value="rune" ${normalizedType==='rune'?'selected':''}>Rune</option>
                <option value="decimal" ${normalizedType==='decimal'?'selected':''}>Decimal</option>
                <option value="bool" ${normalizedType==='bool'?'selected':''}>Bool</option>
                <option value="timestamp" ${normalizedType==='timestamp'?'selected':''}>Timestamp</option>
                <option value="timestampz" ${normalizedType==='timestampz'?'selected':''}>TimestampZ</option>
                <option value="date" ${normalizedType==='date'?'selected':''}>Date</option>
                <option value="datetime" ${normalizedType==='datetime'?'selected':''}>DateTime</option>
                <option value="time" ${normalizedType==='time'?'selected':''}>Time</option>
                <option value="uuid" ${normalizedType==='uuid'?'selected':''}>UUID</option>
                <option value="guid" ${normalizedType==='guid'?'selected':''}>UUID</option>
                <option value="blob" ${normalizedType==='blob'?'selected':''}>Blob</option>
                <option value="map" ${normalizedType==='map'?'selected':''}>Map</option>
            </select>
            <input type="text" placeholder="Value" class="value-field-value" value="${window.escapeHTML(value !== undefined && value !== null && value !== '' ? value : getDefaultFieldValue(normalizedType))}" style="flex:1; padding: 4px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color);" ${readOnly ? 'disabled' : ''}>

    function getDefaultFieldValue(fieldType) {
        const numeric = ['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'uint8', 'uint16', 'uint32', 'uint64', 'rune'];
        const floating = ['float32', 'float64', 'decimal'];
        const now = new Date();

        if (fieldType === 'timestamp') return String(now.getTime());
        if (fieldType === 'timestampz') return now.toISOString();
        if (fieldType === 'date') return now.toISOString().slice(0, 10);
        if (fieldType === 'datetime') return now.toISOString();
        if (fieldType === 'time') return now.toTimeString().slice(0, 8);

        if (numeric.includes(fieldType)) return '0';
        if (floating.includes(fieldType)) return '0.0';
        if (fieldType === 'bool') return 'false';
        if (fieldType === 'blob') return '[]';
        if (fieldType === 'map') return '{}';
        if (fieldType === 'uuid' || fieldType === 'guid') return '00000000-0000-0000-0000-000000000000';
        return '';
    }

        let hasNamedRow = false;
        rows.forEach(row => {

            if (name) hasNamedRow = true;
        });

        if (!hasNamedRow) {
            const firstRow = rows[0];

            if (nameInput && !nameInput.value.trim()) {

            const valueInput = firstRow.querySelector('.key-field-value');

                const fieldType = firstRow.querySelector('.key-field-type')?.value || 'string';
                valueInput.value = getDefaultFieldValue(fieldType);
            }
        }

        return true;
    }

        const row = btn.closest('.key-field-row, .value-field-row, .seed-value-field-row, .index-field-row');
        const container = row.parentElement;
        if (direction === -1) {
            if (row.previousElementSibling) {
                container.insertBefore(row, row.previousElementSibling);
            }
        } else {
            if (row.nextElementSibling) {
                container.insertBefore(row.nextElementSibling, row);
            }
        }
        // Update dependent UI
        if (row.classList.contains('key-field-row')) {

        }

    function populateValueMapFields(info, readOnly = false) {
        const list = document.getElementById('value-map-fields-list');
        if (!list) return;
        list.innerHTML = '';

        const hasSchema = hasSchemaMetadata(info);
        const explicit = Array.isArray(info?.valueFields) && info.valueFields.length > 0
            ? info.valueFields
            : (hasSchema ? Object.keys(info.schema) : (info?.sampleValue && typeof info.sampleValue === 'object' ? Object.keys(info.sampleValue) : []));

        const keyNames = Array.isArray(info?.keyFields) ? info.keyFields : [];
        explicit.filter(name => !keyNames.includes(name)).forEach(name => {
            const rawType = hasSchema
                ? (info.schema[name] || 'string')
                : (info?.sampleValue && typeof info.sampleValue === 'object' ? inferFieldTypeFromValue(info.sampleValue[name]) : 'string');
            addValueFieldRow(name, normalizeFieldType(rawType), '', readOnly);
        });

        if (list.children.length === 0) {
            addValueFieldRow('', 'string', '', readOnly);
        }

        if (readOnly) {
            const addBtn = document.querySelector('#value-map-spec-container button.add-val-btn');
            if (addBtn) {
                addBtn.disabled = true;
                addBtn.style.pointerEvents = 'none';
            }
        }
    }

    function populateKeyFieldsAndIndexSpec(info, readOnly = false) {
        console.log('[Key builder] received schema metadata', {
            schema: info?.schema,
            keyFields: info?.keyFields,
            indexSpec: info?.indexSpec,
            sampleKey: info?.sampleKey,
            readOnly
        });

        // 1. Populate Key Fields (Definition)
        const keyList = document.getElementById('key-fields-list');
        keyList.innerHTML = '';

        let fieldsFound = false;

        const hasSchema = hasSchemaMetadata(info);
        const explicitKeyFields = Array.isArray(info?.keyFields) && info.keyFields.length > 0
            ? info.keyFields
            : (hasSchema ? Object.keys(info.schema).filter(Boolean) : []);

        if (explicitKeyFields.length > 0) {
            explicitKeyFields.forEach(name => {
                const rawType = hasSchema
                    ? (info.schema[name] || 'string')
                    : (info?.sampleKey && typeof info.sampleKey === 'object' ? inferFieldTypeFromValue(info.sampleKey[name]) : 'string');
                const value = hasSchema
                    ? ''
                    : ((info?.sampleKey && typeof info.sampleKey === 'object' && info.sampleKey[name] !== undefined) ? info.sampleKey[name] : '');
                addKeyFieldRow(name, normalizeFieldType(rawType), value, readOnly);
            });
            fieldsFound = true;
        }

        if (!fieldsFound && !hasSchema && info?.sampleKey && typeof info.sampleKey === 'object') {
            Object.keys(info.sampleKey).forEach(k => {
                const val = info.sampleKey[k];
                const type = inferFieldTypeFromValue(val);
                addKeyFieldRow(k, normalizeFieldType(type), val, readOnly);
            });
            fieldsFound = true;
        }

        // Fallback to Index Spec if sample key is missing
        if (!fieldsFound && info?.indexSpec && info.indexSpec.index_fields) {
            info.indexSpec.index_fields.forEach(f => {
                const rawType = (info?.schema && info.schema[f.field_name]) || 'string';
                addKeyFieldRow(f.field_name, normalizeFieldType(rawType), '', readOnly);
            });
        }

        // 2. Populate Index Spec
        const indexList = document.getElementById('index-fields-list');
        indexList.innerHTML = '';
        
        if (info.indexSpec && info.indexSpec.index_fields) {
            info.indexSpec.index_fields.forEach(f => {
                addIndexFieldRow(f.field_name, f.ascending_sort_order ? 'asc' : 'desc');
            });
        }

        populateValueMapFields(info, readOnly);
    }

    function updateIndexDropdowns(targetSelect = null) {
        // Collect all defined key field names
        const keyRows = document.querySelectorAll('.key-field-row');
        const fieldNames = [];
        keyRows.forEach(row => {
            const name = row.querySelector('.key-field-name').value.trim();
            if (name) fieldNames.push(name);
        });

        // Update all index dropdowns
        const indexSelects = document.querySelectorAll('.index-field-select');
        indexSelects.forEach(select => {
            const currentVal = select.value;
            select.innerHTML = '';
            fieldNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.text = name;
                if (name === currentVal) opt.selected = true;
                select.appendChild(opt);
            });
        });

    function generateIndexSpecJSON() {
        const indexRows = document.querySelectorAll('.index-field-row');
        if (indexRows.length === 0) return "";

        const fields = [];
        indexRows.forEach(row => {
            const name = row.querySelector('.index-field-select').value;
            const order = row.querySelector('.index-field-order').value;
            if (name) {
                fields.push({
                    field_name: name,
                    ascending_sort_order: order === 'asc'
                });
            }
        });

        if (fields.length === 0) return "";

        return JSON.stringify({ index_fields: fields });
    }

    function updateSlotLengthWarning() {
        const val = parseInt(document.getElementById('new-store-slot-length').value);
        const warning = document.getElementById('slot-length-warning');
        if (isNaN(val)) {
            warning.style.display = 'none';
            return;
        }
        
        if (val < 10) {
            warning.textContent = "Warning: Very low slot length will degrade performance due to frequent node splitting/merging.";
            warning.style.display = 'block';
        } else if (val > 5000) {
            warning.textContent = "Warning: Large slot length (>5000) may diminish performance gains and increase memory usage per node (L1/L2 cache pressure) when the node is full.";
            warning.style.display = 'block';
        } else {
            warning.style.display = 'none';
        }
    }

    function toggleCacheOptions() {
        const dataSize = document.getElementById('new-store-data-size').value;
        const container = document.getElementById('cache-options-container');
        
        // Data Size: 0=Small, 1=Medium, 2=Big
        // Small (0): Value in Node -> No Cache Config needed (implicit)
        // Medium (1): Value separate -> Cache Config allowed
        // Big (2): Value separate + Persisted -> No Cache Config (typically)
        
        if (dataSize === "1") { // Medium
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
            // Reset values if hidden? Or keep them?
            // If hidden, user can't edit.
            // For Big (2), we might want to force disable cache.
            // For Small (0), cache is irrelevant.
        }
    }

    let preStreamingState = null;

    function toggleStreamingMode() {
        const isStreaming = document.getElementById('new-store-is-streaming').checked;
        const keyTypeSelect = document.getElementById('new-store-key-type');
        const valueTypeSelect = document.getElementById('new-store-value-type');
        const valueInNode = document.getElementById('new-store-value-in-node');
        const dataSizeSelect = document.getElementById('new-store-data-size');
        
        if (isStreaming) {
            // 1. Force Key Type to Map
            if (keyTypeSelect.value !== 'map') {
                keyTypeSelect.value = 'map';
                // Clear existing fields to avoid "undefined" field from toggleIndexSpec default
                document.getElementById('key-fields-list').innerHTML = '';
                toggleIndexSpec(); 
                
                // Add default "Key" field (String) if list is empty
                const rows = document.getElementById('key-fields-list').children;
                if (rows.length === 0) {
                     addKeyFieldRow('Key', 'string');
                } else if (rows.length === 1) {
                    const nameInput = rows[0].querySelector('.key-field-name');
                    if (!nameInput.value) nameInput.value = 'Key';
                }
            }
            
            // 2. Add ChunkIndex field if not exists
            const keyFields = document.querySelectorAll('.key-field-name');
            let hasChunkIndex = false;
            keyFields.forEach(f => { if (f.value === 'ChunkIndex') hasChunkIndex = true; });
            
            if (!hasChunkIndex) {
                addKeyFieldRow('ChunkIndex', 'int');
            }
            
            // 3. Add ChunkIndex to Index Spec if not exists
            const indexSelects = document.querySelectorAll('.index-field-select');
            let hasChunkIndexIndex = false;
            indexSelects.forEach(s => { if (s.value === 'ChunkIndex') hasChunkIndexIndex = true; });
            
            if (!hasChunkIndexIndex) {
                addIndexFieldRow();
                const rows = document.getElementById('index-fields-list').children;
                const lastRow = rows[rows.length - 1];
                const select = lastRow.querySelector('.index-field-select');
                select.value = 'ChunkIndex';
            }
            
            // 4. Force Value Type to Blob
            valueTypeSelect.value = 'blob';
            toggleValueSpec(); 

            // 5. Auto-set Data Size to Big
            if (dataSizeSelect) {
                dataSizeSelect.value = "2"; // Big
                toggleCacheOptions();
            }
            
            if (typeof toggleIndexSpec === 'function') toggleIndexSpec();
            if (typeof toggleValueSpec === 'function') toggleValueSpec();

            // 6. Disable Value In Node (Handled by Data Size now)
            // if (valueInNode) { valueInNode.checked = false; valueInNode.disabled = true; }
            
            // 6. Update Seed Data Values
            setTimeout(() => {
                const seedRows = document.querySelectorAll('.seed-key-field-row');
                seedRows.forEach(row => {
                    const name = row.getAttribute('data-name');
                    const input = row.querySelector('input');
                    if (name === 'ChunkIndex') input.value = '0';
                    if (name === 'Key' && !input.value) input.value = 'sample_id';
                });
            }, 0);
            
            // Set Value to sample byte array
            document.getElementById('new-store-seed-value-simple').value = "[10, 20, 30, 40, 50]";

        } else {
            // Restore Value In Node
            valueInNode.disabled = false;
            valueInNode.checked = true;
        }
        
        if (typeof toggleCacheOptions === 'function') toggleCacheOptions();
    }

    function generateSeedValueJSON() {
        const valType = document.getElementById('new-store-value-type').value;
        
        // 1. Handle Non-Map Types (Simple Input)
        if (valType !== 'map') {
            const valStr = document.getElementById('new-store-seed-value-simple').value.trim();
            if (!valStr) {
                return getDefaultFieldValue(valType);
            }
            
            const isArray = document.getElementById('new-store-value-is-array').checked;
            if (isArray) {
                try {
                    return JSON.parse(valStr);
                } catch (e) {
                    throw new Error("For Array types, please enter a valid JSON array (e.g. [1, 2])");
                }
            }

            // Single Value Parsing
            if (['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'uint8', 'uint16', 'uint32', 'uint64', 'rune'].includes(valType)) {
                let val = parseInt(valStr);
                if (isNaN(val)) val = 0;
                return val;
            } else if (['float32', 'float64', 'decimal'].includes(valType)) {
                let val = parseFloat(valStr);
                if (isNaN(val)) val = 0.0;
                return val;
            } else if (valType === 'bool') {
                return (valStr.toLowerCase() === 'true' || valStr === '1');
            } else if (valType === 'timestamp') {
                let t = parseInt(valStr);
                if (isNaN(t)) {
                    t = Date.parse(valStr);
                    if (isNaN(t)) t = 0;
                }
                return t;
            } else if (valType === 'blob') {
                try {
                    const parsed = JSON.parse(valStr);
                    if (Array.isArray(parsed)) return parsed;
                } catch (e) {}

                // Fallback: Convert string to byte array
                let val = [];
                for (let i = 0; i < valStr.length; i++) {
                    val.push(valStr.charCodeAt(i));
                }
                return val;
            }
            
            // Default string, date, etc.
            return valStr;
        }

        // 2. Handle Map Type (Use the visible value-map builder when present)
        const isRaw = document.getElementById('seed-value-raw-mode').checked;
        if (isRaw) {
            const raw = document.getElementById('new-store-seed-value').value.trim();
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (e) {
                throw new Error("Seed Value (Raw) must be valid JSON");
            }
        }

        const visibleValueRows = Array.from(document.querySelectorAll('.value-field-row')).filter(row => {
            const style = window.getComputedStyle(row);
            return style.display !== 'none' && style.visibility !== 'hidden';
        });
        const fallbackRows = Array.from(document.querySelectorAll('.value-field-row'));
        const rows = visibleValueRows.length > 0 ? visibleValueRows : fallbackRows;

        if (rows.length === 0) {
            addValueFieldRow('F1', 'string', getDefaultFieldValue('string'));
            return {};
        }

        const obj = {};
        rows.forEach(row => {
            const name = row.querySelector('.value-field-name')?.value?.trim()
                || row.querySelector('.seed-field-name')?.value?.trim() || '';
            const type = row.querySelector('.value-field-type')?.value
                || row.querySelector('.seed-field-type')?.value || 'string';
            const valStr = row.querySelector('.value-field-value')?.value
                ?? row.querySelector('.seed-field-value')?.value ?? '';

            if (!name) return;

            let val = valStr;
            if (['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'uint8', 'uint16', 'uint32', 'uint64', 'rune'].includes(type)) {
                val = parseInt(valStr, 10);
                if (isNaN(val)) val = 0;
            } else if (['float32', 'float64', 'decimal'].includes(type)) {
                val = parseFloat(valStr);
                if (isNaN(val)) val = 0.0;
            } else if (['complex64', 'complex128'].includes(type)) {
                val = valStr;
            } else if (type === 'bool') {
                val = (valStr.toLowerCase() === 'true' || valStr === '1');
            } else if (type === 'timestamp') {
                let t = parseInt(valStr, 10);
                if (isNaN(t)) {
                    t = Date.parse(valStr);
                    if (isNaN(t)) t = 0;
                }
                val = t;
            } else if (['date', 'datetime', 'time', 'guid', 'timestampz'].includes(type)) {
                val = valStr;
            } else if (type === 'blob') {
                val = [];
                for (let i = 0; i < valStr.length; i++) {
                    val.push(valStr.charCodeAt(i));
                }
            }

            obj[name] = val;
        });

        return obj;
    }
