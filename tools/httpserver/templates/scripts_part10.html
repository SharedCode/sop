{{define "scripts_part10"}}
<script>
    const setupWizardAIConfigDefaults = {{.SetupWizardAIConfigJSON}};

    function toggleEnterpriseBrain() {
        // Legacy function, kept for safety if referenced elsewhere, but effectively superseded by toggleManualEnterpriseBrain
    }

    function setupProviderLabel(provider) {
        switch ((provider || '').toLowerCase()) {
            case 'openai':
                return 'OpenAI';
            case 'anthropic':
                return 'Anthropic';
            case 'gemini':
                return 'Gemini';
            case 'ollama':
                return 'Ollama';
            default:
                return provider || 'Provider';
        }
    }

    function describeProviderSelection(provider, model, fallbackLabel) {
        if (!provider) {
            return fallbackLabel;
        }

        const providerLabel = setupProviderLabel(provider);
        if (!model) {
            return providerLabel;
        }

        return `${providerLabel} (${model})`;
    }

    function capitalizeSummaryLabel(value) {
        if (!value) {
            return value;
        }
        return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function describeAISummarySelection(aiConfig) {
        const cfg = aiConfig || {};
        const llm = capitalizeSummaryLabel(cfg.brain_model || cfg.brain_provider || 'GPT-5.4');
        const embedder = capitalizeSummaryLabel(cfg.embedder_model || cfg.embedder_provider || 'text-embedding-3-small');
        const embedderNeedsSuffix = !/(embed|embedding)/i.test(embedder);
        return `${llm} * ${embedder}${embedderNeedsSuffix ? ' emb' : ''}`;
    }

    function getSelectedProviderOptionSource(selectId) {
        const select = document.getElementById(selectId);
        if (!select || select.selectedIndex < 0) return 'catalog';
        const option = select.options[select.selectedIndex];
        return option?.dataset?.injected === 'env' ? 'env' : 'catalog';
    }

    function isLocalProviderValue(value) {
        return (value || '').startsWith('ollama') || (value || '').startsWith('local');
    }

    function selectProviderOption(select, value, source) {
        if (!select) return;

        const preferEnv = source === 'env';
        const options = Array.from(select.options);
        const matchingOption = options.find(option => {
            if (option.value !== value) return false;
            const isEnv = option.dataset.injected === 'env';
            return preferEnv ? isEnv : !isEnv;
        }) || options.find(option => option.value === value);

        if (matchingOption) {
            options.forEach(option => {
                option.selected = option === matchingOption;
            });
        }
    }

    function ensureEnvironmentOptgroup(select) {
        if (!select) return null;

        let envGroup = Array.from(select.children).find(child => {
            return child.tagName === 'OPTGROUP' && child.dataset.injectedGroup === 'env';
        });
        if (envGroup) {
            return envGroup;
        }

        envGroup = document.createElement('optgroup');
        envGroup.label = 'Local Storage';
        envGroup.dataset.injectedGroup = 'env';

        const insertBeforeNode = Array.from(select.children).find((child, index) => {
            return index > 0;
        }) || null;

        if (insertBeforeNode) {
            select.insertBefore(envGroup, insertBeforeNode);
        } else {
            select.appendChild(envGroup);
        }

        return envGroup;
    }

    function ensureSetupProviderOption(selectId, provider, model, source = 'catalog', shouldSelect = true) {
        const select = document.getElementById(selectId);
        if (!select || !provider) return;

        const value = model ? `${provider}:${model}` : provider;
        const options = Array.from(select.options);
        const existingCatalog = options.find(option => option.value === value && option.dataset.injected !== 'env');
        let existingEnv = options.find(option => option.value === value && option.dataset.injected === 'env');

        if (!existingCatalog && source !== 'env') {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = model ? `${setupProviderLabel(provider)} (${model})` : `${setupProviderLabel(provider)}`;
            select.appendChild(option);
        }

        if (!existingEnv) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = model ? `${setupProviderLabel(provider)} (${model})` : `${setupProviderLabel(provider)}`;
            option.dataset.injected = 'env';

            const envGroup = ensureEnvironmentOptgroup(select);
            envGroup.appendChild(option);
            existingEnv = option;
        }

        if (shouldSelect) {
            selectProviderOption(select, value, source);
        }
    }

    function getEnvProviderOptions() {
        const cfg = setupWizardAIConfigDefaults || {};
        if (Array.isArray(cfg.env_providers) && cfg.env_providers.length) {
            return cfg.env_providers;
        }
        if (cfg.brain_provider) {
            return [{
                provider: cfg.brain_provider,
                model: cfg.brain_model,
                url: cfg.brain_url,
                api_key: cfg.brain_api_key
            }];
        }
        return [];
    }

    function findEnvProviderOption(provider, model) {
        const exactMatch = getEnvProviderOptions().find(option => {
            if (!option || option.provider !== provider) {
                return false;
            }
            return (option.model || '') === (model || '');
        });
        if (exactMatch) {
            return exactMatch;
        }

        const providerMatches = getEnvProviderOptions().filter(option => {
            return option && option.provider === provider;
        });
        if (providerMatches.length === 1) {
            return providerMatches[0];
        }
        return providerMatches.find(option => !option.model) || null;
    }

    function getCatalogProviderSelection(selectId, provider) {
        const select = document.getElementById(selectId);
        if (!select || !provider) return null;

        const matchingOption = Array.from(select.options).find(option => {
            if (option.dataset.injected === 'env') {
                return false;
            }
            const parts = splitProviderValue(option.value || '');
            return parts.provider === provider;
        });
        if (!matchingOption) {
            return null;
        }

        const parts = splitProviderValue(matchingOption.value || '');
        if (!parts.provider) {
            return null;
        }

        return parts;
    }

    function selectedProviderUsesURL(selectId) {
        const select = document.getElementById(selectId);
        if (!select) return false;

        const value = select.value || '';
        if (!value) {
            return false;
        }
        if (isLocalProviderValue(value)) {
            return true;
        }
        if (getSelectedProviderOptionSource(selectId) !== 'env') {
            return false;
        }

        const parts = splitProviderValue(value);
        const envOption = findEnvProviderOption(parts.provider, parts.model);
        return !!(envOption && envOption.url);
    }

    function shouldOverwriteWithEnvValue(currentValue, fieldName) {
        if (!currentValue) {
            return true;
        }

        return getEnvProviderOptions().some(option => {
            return (option?.[fieldName] || '') === currentValue;
        });
    }

    function applyEnvSelectionDefaults(selectId, apiKeyInputId, urlInputId) {
        const select = document.getElementById(selectId);
        if (!select) return;

        const source = getSelectedProviderOptionSource(selectId);
        if (source !== 'env') return;

        const parts = splitProviderValue(select.value || '');
        const envOption = findEnvProviderOption(parts.provider, parts.model);
        if (!envOption) return;

        const apiKeyInput = document.getElementById(apiKeyInputId);
        const urlInput = document.getElementById(urlInputId);

        if (apiKeyInput && shouldOverwriteWithEnvValue(apiKeyInput.value.trim(), 'api_key')) {
            apiKeyInput.value = envOption.api_key || '';
        }
        if (urlInput && shouldOverwriteWithEnvValue(urlInput.value.trim(), 'url')) {
            urlInput.value = envOption.url || '';
        }
    }

    function handleSetupBrainProviderChange() {
        applyEnvSelectionDefaults('setup-brain-provider', 'setup-brain-api-key', 'setup-brain-url');
        toggleProviderAuth();
    }

    function handleChatSettingsProviderChange() {
        applyEnvSelectionDefaults('chat-settings-provider-overlay', 'chat-settings-overlay-api-key', 'chat-settings-url');
        toggleChatSettingsFields();
        if (typeof persistChatSettingsDraft === 'function') {
            const nextConfig = persistChatSettingsDraft();
            syncSetupWizardControlsFromAIConfig(nextConfig);
        }
    }

    function handleSetupEmbedderProviderChange() {
        applyEnvSelectionDefaults('setup-embedder-provider', 'setup-embedder-api-key', 'setup-embedder-url');
        toggleProviderAuth();
    }

    function handleChatSettingsEmbedderProviderChange() {
        applyEnvSelectionDefaults('chat-settings-embedder-overlay', 'chat-settings-embedder-api-key', 'chat-settings-embedder-url');
        toggleChatSettingsFields();
        if (typeof persistChatSettingsDraft === 'function') {
            const nextConfig = persistChatSettingsDraft();
            syncSetupWizardControlsFromAIConfig(nextConfig);
        }
    }

    function injectEnvBackedAIOptions(envConfig) {
        const cfg = envConfig || {};
        const providers = Array.isArray(cfg.env_providers) && cfg.env_providers.length
            ? cfg.env_providers
            : (cfg.brain_provider ? [{ provider: cfg.brain_provider, model: cfg.brain_model, url: cfg.brain_url, api_key: cfg.brain_api_key }] : []);

        providers.forEach(option => {
            if (!option || !option.provider) {
                return;
            }

            ensureSetupProviderOption('setup-brain-provider', option.provider, option.model, 'env', false);
            ensureSetupProviderOption('chat-settings-provider-overlay', option.provider, option.model, 'env', false);

            const embedderSelection = getCatalogProviderSelection('setup-embedder-provider', option.provider);
            if (embedderSelection) {
                ensureSetupProviderOption('setup-embedder-provider', embedderSelection.provider, embedderSelection.model, 'env', false);
                ensureSetupProviderOption('chat-settings-embedder-overlay', embedderSelection.provider, embedderSelection.model, 'env', false);
            }
        });

        if (cfg.brain_provider) {
            ensureSetupProviderOption('setup-brain-provider', cfg.brain_provider, cfg.brain_model, 'env');
            ensureSetupProviderOption('chat-settings-provider-overlay', cfg.brain_provider, cfg.brain_model, 'env');
        }

        if (cfg.embedder_provider) {
            ensureSetupProviderOption('setup-embedder-provider', cfg.embedder_provider, cfg.embedder_model, 'env');
            ensureSetupProviderOption('chat-settings-embedder-overlay', cfg.embedder_provider, cfg.embedder_model, 'env');
        }
    }

    function syncChatControlsFromAIConfig(aiConfig) {
        const cfg = aiConfig || {};
        const summaryCombined = document.getElementById('chat-ai-summary-combined');

        if (summaryCombined) {
            summaryCombined.textContent = describeAISummarySelection(cfg);
        }

        if (!cfg.brain_provider) {
            if (!cfg.embedder_provider) {
                return;
            }
        }

        const source = cfg.brain_source || 'catalog';
        const embedderSource = cfg.embedder_source || 'catalog';

        ensureSetupProviderOption('chat-settings-provider-overlay', cfg.brain_provider, cfg.brain_model, source);
        ensureSetupProviderOption('chat-settings-embedder-overlay', cfg.embedder_provider, cfg.embedder_model, embedderSource);

        const overlayURL = document.getElementById('chat-settings-url');
        const overlayAPIKey = document.getElementById('chat-settings-overlay-api-key');
        const overlayEmbedder = document.getElementById('chat-settings-embedder-overlay');
        const overlayEmbedderURL = document.getElementById('chat-settings-embedder-url');
        const overlayEmbedderAPIKey = document.getElementById('chat-settings-embedder-api-key');
        if (overlayURL) {
            overlayURL.value = cfg.brain_url || '';
        }
        if (overlayAPIKey) {
            overlayAPIKey.value = cfg.brain_api_key || '';
        }
        if (document.getElementById('chat-settings-provider-overlay')) {
            selectProviderOption(document.getElementById('chat-settings-provider-overlay'), buildProviderValue(cfg.brain_provider, cfg.brain_model), source);
        }
        if (overlayEmbedder) {
            selectProviderOption(overlayEmbedder, buildProviderValue(cfg.embedder_provider, cfg.embedder_model), embedderSource);
        }
        if (overlayEmbedderURL) {
            overlayEmbedderURL.value = cfg.embedder_url || '';
        }
        if (overlayEmbedderAPIKey) {
            overlayEmbedderAPIKey.value = cfg.embedder_api_key || '';
        }

        toggleChatSettingsFields();
    }

    function syncSetupWizardControlsFromAIConfig(aiConfig) {
        const cfg = aiConfig || {};
        if (!cfg.brain_provider && !cfg.embedder_provider) {
            return;
        }

        ensureSetupProviderOption('setup-brain-provider', cfg.brain_provider, cfg.brain_model, cfg.brain_source || 'catalog');
        ensureSetupProviderOption('setup-embedder-provider', cfg.embedder_provider, cfg.embedder_model, cfg.embedder_source || 'catalog');

        const brainAPIKeyInput = document.getElementById('setup-brain-api-key');
        const brainURLInput = document.getElementById('setup-brain-url');
        const embedderAPIKeyInput = document.getElementById('setup-embedder-api-key');
        const embedderURLInput = document.getElementById('setup-embedder-url');

        if (brainAPIKeyInput) {
            brainAPIKeyInput.value = cfg.brain_api_key || '';
        }
        if (brainURLInput) {
            brainURLInput.value = cfg.brain_url || '';
        }
        if (embedderAPIKeyInput) {
            embedderAPIKeyInput.value = cfg.embedder_api_key || '';
        }
        if (embedderURLInput) {
            embedderURLInput.value = cfg.embedder_url || '';
        }

        toggleProviderAuth();
    }

    function initializeChatAIConfig() {
        syncChatControlsFromAIConfig(getStoredAIConfig());
    }

    function getStoredAIConfigValue(storedConfig, key, fallbackValue) {
        if (Object.prototype.hasOwnProperty.call(storedConfig || {}, key)) {
            return storedConfig[key] || '';
        }
        return fallbackValue;
    }

    function mergeSetupAIConfig(storedConfig, envConfig) {
        const brainSource = storedConfig.brain_source || (envConfig.brain_provider ? 'env' : 'catalog');
        const embedderSource = storedConfig.embedder_source || (envConfig.embedder_provider ? 'env' : 'catalog');

        return {
            brain_provider: storedConfig.brain_provider || envConfig.brain_provider || '',
            brain_model: storedConfig.brain_model || envConfig.brain_model || '',
            brain_source: brainSource,
            brain_url: getStoredAIConfigValue(storedConfig, 'brain_url', brainSource === 'env' ? (envConfig.brain_url || '') : ''),
            brain_api_key: getStoredAIConfigValue(storedConfig, 'brain_api_key', brainSource === 'env' ? (envConfig.brain_api_key || '') : ''),
            embedder_provider: storedConfig.embedder_provider || envConfig.embedder_provider || '',
            embedder_model: storedConfig.embedder_model || envConfig.embedder_model || '',
            embedder_source: embedderSource,
            embedder_url: getStoredAIConfigValue(storedConfig, 'embedder_url', embedderSource === 'env' ? (envConfig.embedder_url || '') : ''),
            embedder_api_key: getStoredAIConfigValue(storedConfig, 'embedder_api_key', embedderSource === 'env' ? (envConfig.embedder_api_key || '') : '')
        };
    }

    function initializeSetupWizardAIConfig() {
        const envConfig = setupWizardAIConfigDefaults || {};
        const hasEnvDefaults = Object.values(envConfig).some(value => !!value);

        injectEnvBackedAIOptions(envConfig);

        let storedConfig = {};
        storedConfig = getStoredAIConfig();

        const mergedConfig = mergeSetupAIConfig(storedConfig, envConfig);
        const hasMergedConfig = Object.values(mergedConfig).some(value => !!value);
        if (!hasEnvDefaults && !hasMergedConfig) {
            return;
        }

        setStoredAIConfig(mergedConfig);
        syncSetupWizardControlsFromAIConfig(mergedConfig);
        initializeChatAIConfig();
    }

    // Auto-update DB Path based on Name
    document.addEventListener('DOMContentLoaded', () => {
        initializeSetupWizardAIConfig();
        initializeChatAIConfig();

        const setupDbNameInput = document.getElementById('setup-db-name');
        const setupDbPathInput = document.getElementById('setup-db-path');
        
        if (setupDbNameInput && setupDbPathInput) {
            setupDbNameInput.addEventListener('input', function() {
                const currentName = this.value.trim();
                const currentPath = setupDbPathInput.value.trim();
                
                // Simple heuristic to update basename only if it looks like a standard unix path
                const lastSlash = currentPath.lastIndexOf('/');
                if (lastSlash !== -1) {
                     const basePath = currentPath.substring(0, lastSlash + 1);
                     setupDbPathInput.value = basePath + (currentName || 'db');
                }
            });
        }

        // Auto-sync Store Folders (Advanced) back to Data Path (Simple)
        const setupDbStoresInput = document.getElementById('setup-db-stores-folders');
        if (setupDbStoresInput && setupDbPathInput) {
            setupDbStoresInput.addEventListener('input', function() {
                 const raw = this.value;
                 const firstPath = raw.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0)[0];
                 if (firstPath) {
                     setupDbPathInput.value = firstPath;
                 }
            });
        }
    });

    function showSetupWizard() {
        openUIModal('setup-wizard');
        
        // Initialize User DB EC Container if empty
        const container = document.getElementById('setup-db-ec-container');
        if (container && container.children.length <= 1) { // 1 is helper text
             // Clear existing entries (keep p tag if possible, or just rebuild)
             // The p tag is inside. Let's just append if no .ec-entry exist
             if (container.querySelectorAll('.ec-entry').length === 0) {
                 addSetupDbECItem();
             }
        }
        
        // Ensure UI state matches Defaults (Clustered)
        toggleSetupConnectionField('db');
        toggleSetupConnectionField('sys');
        
        updateWizardStep();
    }

    function updateWizardStep() {
        // Update Steps
        document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
        document.getElementById(`step-${currentWizardStep}`).classList.add('active');

        // Update Dots
        for (let i = 1; i <= 3; i++) {
            const dot = document.getElementById(`dot-${i}`);
            dot.classList.remove('active', 'completed');
            if (i === currentWizardStep) dot.classList.add('active');
            if (i < currentWizardStep) dot.classList.add('completed');
        }

        // Update Buttons
        document.getElementById('wizard-prev').style.visibility = currentWizardStep === 1 ? 'hidden' : 'visible';
        const nextBtn = document.getElementById('wizard-next');
        nextBtn.textContent = currentWizardStep === 3 ? 'Finish' : 'Next';
        nextBtn.title = currentWizardStep === 3 ? 'Click "Finish" to create the configuration and initialize the databases.' : '';

        // Update Help Link based on Step
        const helpLink = document.getElementById('wizard-help-link');
        if (helpLink) {
            if (currentWizardStep === 3) {
                // Step 3: Language Bindings (Integration)
                helpLink.href = "https://github.com/sharedcode/sop/blob/main/docs/installation/LANGUAGE_BINDINGS.md";
                helpLink.title = "Read the Integration Tutorial";
            } else {
                // Step 1 & 2: Setup/Config Concepts
                helpLink.href = "https://github.com/sharedcode/sop/blob/main/docs/installation/DATA_MANAGER_SETUP.md";
                helpLink.title = "Read the Setup Guide";
            }
        }

        // Populate Summary on Step 3
        if (currentWizardStep === 3) {
            // User DB Config (Step 1)
            const dbName = document.getElementById('setup-db-name').value;
            const dbPath = document.getElementById('setup-db-path').value;
            const dbType = document.getElementById('setup-db-type').value;
            const dbConn = document.getElementById('setup-db-conn').value;
            const populateDemo = document.getElementById('setup-populate-demo').checked;
             let selectedTemplate = Array.from(document.querySelectorAll('input[id^="setup-populate-template-"]:checked')).map(cb => cb.dataset.name).join(', ') || 'None';
            
            // System Config (Step 2)
            const regPath = document.getElementById('setup-reg-path').value;
            const port = document.getElementById('setup-port').value;
            
            let sysType = document.getElementById('setup-sys-type').value;
            let sysConn = document.getElementById('setup-sys-conn').value;

            // Check if Data Files (EC) configured
            const dbErasureConfigs = collectEcConfigs('setup-db-ec-container');
            const ecSummary = dbErasureConfigs ? `${dbErasureConfigs.length} entries configured` : 'None';

            let summaryHtml = `
                <strong>User Database:</strong> ${dbName}<br>
                <strong>Path:</strong> ${dbPath}<br>
                <strong>Type:</strong> ${dbType} ${dbType === 'clustered' ? `(${dbConn})` : ''}<br>
                <strong>Data Files (EC):</strong> ${ecSummary}<br>
                <strong>Demo Data:</strong> ${populateDemo ? 'Yes' : 'No'}<br>
                <strong>Spaces:</strong> ${selectedTemplate}<br>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 10px 0;">
                <strong>System Database:</strong> ${regPath}<br>
                <strong>Port:</strong> ${port}<br>
                <strong>Type:</strong> ${sysType} ${sysType === 'clustered' ? `(${sysConn})` : ''}<br>
                <strong>Configuration:</strong> System Defaults applied<br>
            `;
            
            document.getElementById('setup-summary').innerHTML = summaryHtml;
        }
    }

    function wizardNext() {
        if (currentWizardStep < 3) {
            // Validation
            if (currentWizardStep === 1) { // Was 2: User DB
                // Unified Validation
                const err = validateDbForm('setup-db');
                if (err) return showAlert(err);

                const name = document.getElementById('setup-db-name').value;
                const path = document.getElementById('setup-db-path').value;
                // if (!name || !path) return showAlert("Database Name and Path are required"); // Replaced by validateDbForm
                
                // Auto-populate System DB Manual Fields from User DB
                document.getElementById('setup-sys-type').value = document.getElementById('setup-db-type').value;
                document.getElementById('setup-sys-conn').value = document.getElementById('setup-db-conn').value;
                document.getElementById('setup-sys-registry-hash-mod').value = document.getElementById('setup-db-registry-hash-mod').value;
                
                // Helper to replace last segment with SYSTEM_DB_NAME
                const replaceLastSegment = (path) => {
                    if (!path) return `/tmp/sop_data/${SYSTEM_DB_NAME}`;
                    const isWin = path.includes('\\');
                    const sep = isWin ? '\\' : '/';
                    // Split, remove last, add SYSTEM_DB_NAME
                    // Handle trailing slash
                    let parts = path.split(sep).filter(p => p.length > 0);
                    if (parts.length > 0) parts.pop();
                    parts.push(SYSTEM_DB_NAME);
                    return (path.startsWith(sep) ? sep : '') + parts.join(sep);
                };

                const dbStores = document.getElementById('setup-db-stores-folders').value;
                if (dbStores) {
                    const paths = dbStores.split(',').map(s => s.trim());
                    const sysPaths = paths.map(p => replaceLastSegment(p));
                    document.getElementById('setup-sys-stores-folders').value = sysPaths.join(', ');
                }
                
                const dbPath = document.getElementById('setup-db-path').value;
                // Only auto-populate if NOT using Enterprise Brain (Auto or Manual)
                const entToggle = document.getElementById('setup-sys-use-enterprise');
                const manualEntToggle = document.getElementById('setup-sys-use-manual-enterprise');
                const isUsingEnterprise = (entToggle && entToggle.checked) || (manualEntToggle && manualEntToggle.checked);
                
                if (dbPath && !isUsingEnterprise) {
                    document.getElementById('setup-reg-path').value = replaceLastSegment(dbPath);
                }

                toggleSetupConnectionField('sys');

                // Auto-populate System DB EC Container from User DB (Max 4)
                 const dbErasureConfigs = collectEcConfigs('setup-db-ec-container');
                 const sysContainer = document.getElementById('setup-sys-ec-container');
                 // Clear existing EC entries (keep helper text)
                 sysContainer.querySelectorAll('.ec-entry').forEach(e => e.remove());

                 if (dbErasureConfigs && dbErasureConfigs.length > 0) {
                     const limit = 4;
                     const toAdd = dbErasureConfigs.slice(0, limit);
                     toAdd.forEach(item => {
                         addErasureConfigRow('setup-sys-ec-container');
                         const newEntry = sysContainer.lastElementChild;
                         if (newEntry) {
                             newEntry.querySelector('.ec-key').value = item.key;
                             newEntry.querySelector('.ec-data').value = item.data_chunks;
                             newEntry.querySelector('.ec-parity').value = item.parity_chunks;
                             if (item.base_paths) {
                                  // Copy base paths directly without modification (User Request)
                                  const sysBasePaths = item.base_paths;
                                  newEntry.querySelector('.ec-paths').value = sysBasePaths.join(', ');
                             }
                         }
                     });
                 } else {
                     // Ensure at least one empty row if none exists ? 
                     // No, user might not want EC. But generally System DB might need it if matched.
                     if (sysContainer.querySelectorAll('.ec-entry').length === 0) {
                        addErasureConfigRow('setup-sys-ec-container');
                     }
                 }

            } else if (currentWizardStep === 2) { // Was 1: System Config
                 const manualEntToggle = document.getElementById('setup-sys-use-manual-enterprise');
                 const isShared = manualEntToggle && manualEntToggle.checked;
                 const path = document.getElementById('setup-reg-path').value;
                 
                 if (!path) return showAlert("Please enter a system database path");

                 // If Shared Brain (Reuse Existing): Strict Validation
                 if (isShared) {
                    apiCall(`/api/config/validate-path?path=${encodeURIComponent(path)}&t=${Date.now()}`)
                    .then(data => {
                        if (!data.exists) return showAlert("Path does not exist on server.");
                        if (!data.isDir) return showAlert("Path is not a directory.");
                        // Must have valid system DB files
                        if (!data.hasDBOptions) return showAlert("Invalid Shared System DB: 'dboptions.json' not found.");
                        if (!data.hasRegHashMod) return showAlert("Invalid Shared System DB: Registry config 'reghashmod.txt' not found.");

                        currentWizardStep++;
                        updateWizardStep();
                    })
                    .catch(err => {
                        // Alerted by apiCall
                    });
                    return;
                 }
                 
                 // If NOT Shared Brain (Create New): Skip validation, User handles "Advanced" or Default
                 // We don't block for writability here (let Init fail if so), effectively restoring old behavior.
                 currentWizardStep++;
                 updateWizardStep();
                 return;
            }
            currentWizardStep++;
            updateWizardStep();
        } else {
            // Step 3: Validate AI Configuration before finishing
            const bProviderValue = document.getElementById('setup-brain-provider') ? document.getElementById('setup-brain-provider').value : "";
            const bApiKey = document.getElementById('setup-brain-api-key') ? document.getElementById('setup-brain-api-key').value.trim() : "";
            
            // Check if provider is selected and requires API key (not local/ollama)
            if (bProviderValue && !isLocalProviderValue(bProviderValue) && !bApiKey) {
                return showAlert("API Key is required for the selected LLM provider");
            }
            
            finishSetup();
        }
    }

    function finishSetup() {
        // Collect DB Settings
        let dbName = document.getElementById('setup-db-name').value;
        let dbPath = document.getElementById('setup-db-path').value;
        
        // --- explicit validation ---
        if (!dbName || !dbName.trim()) return showAlert("Database Name is required");
        if (!dbPath || !dbPath.trim()) return showAlert("Database Path is required");
        
        const manualDBToggle = document.getElementById('setup-db-use-manual');
        if (manualDBToggle && manualDBToggle.checked) {
             // If manual/shared, user entered FULL PATH in the PATH field
             // We need to split it into path (parent) and name (folder)
             let cleanPath = dbPath;
             while (cleanPath.length > 0 && (cleanPath.endsWith('/') || cleanPath.endsWith('\\'))) {
                 cleanPath = cleanPath.slice(0, -1);
             }
             
             // Find last separator
             const idxSlash = cleanPath.lastIndexOf('/');
             const idxBackslash = cleanPath.lastIndexOf('\\');
             const idx = Math.max(idxSlash, idxBackslash);

             if (idx >= 0) {
                 dbName = cleanPath.substring(idx + 1);
                 dbPath = cleanPath.substring(0, idx);
                 // If path is empty (e.g. /name), make it /
                 if (dbPath === "") dbPath = "/";
             } else {
                 // No separator? Assume it's just a name in current dir? 
                 // Or treat as relative path.
                 dbName = cleanPath;
                 dbPath = ".";
             }
        }

        // 1. Determine User DB Settings (Simple vs Advanced)
        const dbAdvToggle = document.getElementById('setup-db-advanced-toggle');
        const isDbAdvanced = dbAdvToggle && dbAdvToggle.checked;
        
        let finalDbStoresFoldersRaw = null;
        let finalDbHashMod = 0;
        let finalDbErasureConfigs = [];
        
        if (isDbAdvanced) {
             finalDbStoresFoldersRaw = document.getElementById('setup-db-stores-folders').value.trim();
             // In advanced mode, the single "dbPath" is ignored or derived from first store? 
             // To pass validation, we ensure dbPath reflects the first store
             if (!finalDbStoresFoldersRaw) return showAlert("In Advanced Mode, at least one Store Folder is required for User DB.");
             dbPath = finalDbStoresFoldersRaw.split(/[\n,]+/).map(s=>s.trim())[0];
             
             finalDbHashMod = document.getElementById('setup-db-registry-hash-mod').value;
             finalDbErasureConfigs = collectEcConfigs('setup-db-ec-container') || [];
        } else {
             // Simple Mode: Use the explicit simple input
             dbPath = document.getElementById('setup-db-path').value.trim();
             if (!dbPath) return showAlert("Database Path is required");
             // Reset advanced fields
             finalDbStoresFoldersRaw = "";
             finalDbHashMod = 0;
             finalDbErasureConfigs = [];
        }

        const dbType = document.getElementById('setup-db-type').value;
        const dbConn = document.getElementById('setup-db-conn').value;
        const populateDemo = document.getElementById('setup-populate-demo').checked;
        const populateMedical = document.getElementById('setup-populate-medical') ? document.getElementById('setup-populate-medical').checked : false;


        // 2. Determine System DB Settings (Simple vs Advanced)
        const port = parseInt(document.getElementById('setup-port').value);
        const bProviderValue = document.getElementById('setup-brain-provider') ? document.getElementById('setup-brain-provider').value : "";
        const bParts = splitProviderValue(bProviderValue);
        const bProvider = bParts.provider;
        const bModel = bParts.model || (document.getElementById('setup-brain-model') ? document.getElementById('setup-brain-model').value.trim() : "");
        const bUrl = document.getElementById('setup-brain-url') ? document.getElementById('setup-brain-url').value.trim() : "";
        const bApiKey = document.getElementById('setup-brain-api-key') ? document.getElementById('setup-brain-api-key').value.trim() : "";

        const eProviderValue = document.getElementById('setup-embedder-provider') ? document.getElementById('setup-embedder-provider').value : "";
        const eParts = splitProviderValue(eProviderValue);
        const eProvider = eParts.provider;
        const eModel = eParts.model || (document.getElementById('setup-embedder-model') ? document.getElementById('setup-embedder-model').value.trim() : "");
        const eUrl = document.getElementById('setup-embedder-url') ? document.getElementById('setup-embedder-url').value.trim() : "";
        const eApiKey = document.getElementById('setup-embedder-api-key') ? document.getElementById('setup-embedder-api-key').value.trim() : "";
        const sysAdvToggle = document.getElementById('setup-sys-advanced-toggle');
        const isSysAdvanced = sysAdvToggle && sysAdvToggle.checked;

        let regPath = null;
        let sysType = document.getElementById('setup-sys-type').value;
        let sysConn = document.getElementById('setup-sys-conn').value;
        
        let sysHashMod = 0;
        let sysStoresFoldersRaw = null;
        let sysErasureConfigs = [];
        
        let validationRegPath = "";

        if (isSysAdvanced) {
            sysStoresFoldersRaw = document.getElementById('setup-sys-stores-folders').value.trim();
            if (!sysStoresFoldersRaw) return showAlert("In Advanced Mode, at least one Store Folder is required for System DB.");
            
            // In Advanced Mode, we send specific stores folders. Sending registry_path as well causes a conflict in the backend validation.
            // So we set regPath to empty string for the payload.
            regPath = "";
            // Use the first folder for client-side collision validation
            validationRegPath = sysStoresFoldersRaw.split(/[\n,]+/).map(s=>s.trim())[0];
            
            sysHashMod = document.getElementById('setup-sys-registry-hash-mod').value;
            const manualConfigs = collectEcConfigs('setup-sys-ec-container');
            if (manualConfigs) sysErasureConfigs = manualConfigs;
        } else {
            // Simple Mode: Use explicit simple input
            regPath = document.getElementById('setup-reg-path').value.trim();
            if (!regPath) return showAlert("System Database Path is required");
            validationRegPath = regPath;
            
            // Reset advanced fields
            sysStoresFoldersRaw = "";
            sysHashMod = 0;
            sysErasureConfigs = [];
        }
        
        // Prevent collision
        const normalize = (p) => p.trim().replace(/[/\\]+$/, "");
        if (normalize(dbPath) === normalize(validationRegPath)) {
            return showAlert("User Database Path and System Database Path cannot be the same.");
        }

        // Shared Brain/DB Overrides (if checking "Connect to Existing")
        const manualEntToggle = document.getElementById('setup-sys-use-manual-enterprise');
        if (manualEntToggle && manualEntToggle.checked) {
            // If connecting to existing, we use regPath (simple) but ensure advanced config is ignored
            sysErasureConfigs = [];
            sysStoresFoldersRaw = "";
            sysHashMod = null;
        }
        
        if (manualDBToggle && manualDBToggle.checked) {
             finalDbErasureConfigs = [];
             finalDbStoresFoldersRaw = "";
             finalDbHashMod = null;
        }

        const nextBtn = document.getElementById('wizard-next');
        nextBtn.disabled = true;
        nextBtn.textContent = "Setting up...";
        nextBtn.title = "Creating databases and configuring environments...";

        console.log("DEBUG: wizard payload", {
            dbName, dbPath, dbStoresFoldersRaw: finalDbStoresFoldersRaw, regPath, sysStoresFoldersRaw
        });

        // --- Helper to Convert Frontend EC Config to SOP Backend Map ---
        const convertToSopEcMap = (arr) => {
             const m = {};
             if (!arr || arr.length === 0) return null;
             arr.forEach(item => {
                 let key = item.key || "default";
                 if (key === '""') key = "";
                 m[key] = {
                     data_shards_count: item.data_chunks,
                     parity_shards_count: item.parity_chunks,
                     base_folder_paths_across_drives: item.base_paths
                 };
             });
             return m;
        };

        // --- Construct System Options (sop.DatabaseOptions) ---
        const systemOptions = {
            type: sysType === 'clustered' ? 1 : 0, // sop.DatabaseType Enum (0=Standalone, 1=Clustered)
            cache_type: sysType === 'clustered' ? 1 : 0,
            registry_hash_mod: sysHashMod ? parseInt(sysHashMod) : 0,
            stores_folders: sysStoresFoldersRaw ? sysStoresFoldersRaw.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0) : null
        };
        if (sysType === 'clustered') {
             systemOptions.redis_config = { address: sysConn || "localhost:6379" };
        }
        const sysEcMap = convertToSopEcMap(sysErasureConfigs);
        if (sysEcMap) {
            systemOptions.erasure_config = sysEcMap;
        }

        // --- Construct User Options (sop.DatabaseOptions) ---
        const userOptions = {
            type: dbType === 'clustered' ? 1 : 0,
            cache_type: dbType === 'clustered' ? 1 : 0,
            registry_hash_mod: finalDbHashMod ? parseInt(finalDbHashMod) : 0,
            stores_folders: finalDbStoresFoldersRaw ? finalDbStoresFoldersRaw.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0) : null
        };
        if (dbType === 'clustered') {
             userOptions.redis_config = { address: dbConn || "localhost:6379" };
        }
        const userEcMap = convertToSopEcMap(finalDbErasureConfigs);
        if (userEcMap) {
            userOptions.erasure_config = userEcMap;
        }

        const userDBRequest = {
            name: dbName,
            path: dbPath,
            use_shared_db: manualDBToggle ? manualDBToggle.checked : false,
            populate_demo: populateDemo,
            populate_medical: populateMedical,
            options: userOptions
        };

        // --- Save AI config to local browser storage (BYOK) ---
        const aiConfig = {
            brain_provider: bProvider,
            brain_model: bModel,
            brain_url: bUrl,
            brain_api_key: bApiKey,
            embedder_provider: eProvider,
            embedder_model: eModel,
            embedder_url: eUrl,
            embedder_api_key: eApiKey
        };
        localStorage.setItem('sop_ai_config', JSON.stringify(aiConfig));

        // --- Construct Main Payload ---
        const finalPayload = {
            registry_path: regPath,
            port: port,
            brain_provider: bProvider,
            brain_model: bModel,
            brain_url: bUrl,
            brain_api_key: bApiKey,
            embedder_provider: eProvider,
            embedder_model: eModel,
            embedder_url: eUrl,
            embedder_api_key: eApiKey,
            use_shared_brain: manualEntToggle ? manualEntToggle.checked : false,
            system_options: systemOptions,
            databases: [ userDBRequest ]
        };

        // UI Loading State (Synchronous wait for the heavy DBs)
        const loadingModal = document.getElementById('setup-loading-modal');
        const pb = document.getElementById('setup-progress-bar');
        const pbDetails = document.getElementById('setup-loading-details');
        
        if (loadingModal) {
            loadingModal.style.display = 'flex';
            closeUIModal('setup-wizard');
            pb.style.width = '10%';
            pbDetails.innerHTML = '- Initializing config save...<br>';
            
            // Faux progress steps since response is monolithic
            let pTicks = 0;
            const maxTicks = 10;
            const progressItl = setInterval(() => {
                pTicks++;
                if (pTicks === 2) {
                    pb.style.width = '30%';
                    pbDetails.innerHTML += '- Creating System & User Data Stores...<br>';
                  } else if (pTicks === 4 && (populateDemo || document.querySelectorAll('input[id^="setup-populate-template-"]:checked').length > 0)) {
                      pb.style.width = '50%';
                      pbDetails.innerHTML += '- Pre-loading specified template datasets...<br>';
                      document.getElementById('setup-loading-message').innerText = 'Loading templates - this may take a bit...';
                  } else if (pTicks === 7 && document.querySelectorAll('input[id^="setup-populate-template-"]:checked').length > 0) {
                      pb.style.width = '70%';
                      pbDetails.innerHTML += '- Compiling semantic models...<br>';
                } else if (pTicks === 8 && populateDemo) {
                    pb.style.width = '85%';
                    pbDetails.innerHTML += '- Inserting demo & medical domains concurrently...<br>';
                } else if (pTicks >= 10) {
                    pb.style.width = '95%';
                    pbDetails.innerHTML += '- Waiting for final DB persistence sync...<br>';
                    clearInterval(progressItl);
                }
            }, 1500);
            
            window._setupProgressItl = progressItl;
        }

        // 1. Single Atomic Save & Setup Call
        apiCall('/api/config/save', 'POST', finalPayload)
        .then(async () => {
            if (window._setupProgressItl) clearInterval(window._setupProgressItl);

            let sopTaskId = null;
            let medTaskId = null;

            // 1. Trigger SOP Space preload
            try {
                const sopRes = await fetch('/api/spaces/preload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        template_id: 'SOP',
                        database_name: SYSTEM_DB_NAME
                    })
                });
                if (sopRes.ok) {
                    const data = await sopRes.json();
                    sopTaskId = data.task_id;
                } else {
                    const text = await sopRes.text();
                    alert("Critical Error: Missing SOP KB JSON! SOP Space failed to initialize: " + text);
                    console.error("Critical SOP KB missing:", text);
                }
            } catch (e) {
                console.error("Failed to trigger SOP preload:", e);
                alert("Critical Error: Failed to trigger SOP preload. " + e.message);
            }

            // 2. Trigger Medical Space preload if requested (Preload Examples checkbox)
            if (populateDemo) {
                try {
                    const medRes = await fetch('/api/spaces/preload', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            template_id: 'medical',
                            database_name: dbName
                        })
                    });
                    if (medRes.ok) {
                        const data = await medRes.json();
                        medTaskId = data.task_id;
                    }
                } catch (e) {
                    console.error("Failed to trigger Medical preload:", e);
                }
            }

            // 3. Poll Tasks via global system
            try {
                const msg = document.getElementById('setup-loading-message');
                if (msg) msg.innerText = 'Preloading spaces...';

                const pollPromises = [];
                if (sopTaskId) pollPromises.push(pollLongRunningTask(sopTaskId, null, null, "SOP", false));
                if (medTaskId) pollPromises.push(pollLongRunningTask(medTaskId, null, null, "Medical", false));
                
                const results = await Promise.allSettled(pollPromises);
                const errors = results.filter(r => r.status === 'rejected').map(r => r.reason.message || r.reason);
                if (errors.length > 0) {
                    throw new Error(errors.join(" | "));
                }
            } catch (e) {
                console.error("Error during space preloading:", e);
                alert("Critical Error: Failed to preload Knowledge Base JSON: " + e);
                // We'll still proceed to finish setup, but log the error
                const details = document.getElementById('setup-loading-details');
                if (details) details.innerHTML += `<span style="color: var(--text-red);">- Preload Error: ${e.message}</span><br>`;
                await new Promise(r => setTimeout(r, 2000));
            }

            if (loadingModal) {
                loadingModal.style.display = 'none';
            }

            // 4. Reload/Redirect
            resetSetupForm();

            const currentPort = window.location.port || (window.location.protocol === 'https:' ? '443' : '80');
            if (port && port != parseInt(currentPort)) {
                 const hostname = window.location.hostname;
                 const newUrl = `${window.location.protocol}//${hostname}:${port}`;
                 showAlert(`Setup Complete! IMPORTANT: You changed the port to ${port}. Please RESTART the server manually, then open: ${newUrl}`, null);
            } else {            
                 window.location.reload();
            }
        })
        .catch(err => {
            if (window._setupProgressItl) clearInterval(window._setupProgressItl);
            const loadingModal = document.getElementById('setup-loading-modal');
            if (loadingModal) loadingModal.style.display = 'none';
            openUIModal('setup-wizard'); // Restore UI
            console.error(err);
            nextBtn.disabled = false;
            nextBtn.textContent = "Finish";
            nextBtn.title = 'Click "Finish" to create the configuration and initialize the databases.';
        });
    }

    function applyPreferences() {
        // Default to 'app' (Auto 2) if not set
        const mobileMode = localStorage.getItem('sop_ui_mobile_mode') || 'app';
        const isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        let useAI = false;
        let lockAI = false;

        if (mobileMode === 'app') {
            // Auto 2: AI Only on Mobile
            if (isMobile) {
                useAI = true;
                lockAI = true;
            }
        } else if (mobileMode === 'hybrid') {
            // Auto 1: AI Default on Mobile, but can minimize
            if (isMobile) {
                useAI = true;
                lockAI = false;
            }
        } else if (mobileMode === 'desktop') {
            // Desktop Mode: Manual toggle only
            useAI = false;
            lockAI = false;
        }

        const widget = document.getElementById('chat-widget');
        const minimizeBtn = widget.querySelector('.minimize-btn');
        const resetBtn = widget.querySelector('.reset-btn');

        if (useAI) {
            // Auto-open chat if not already open
            if (!widget.classList.contains('active')) {
                toggleChatWidget(true);
            }
        }

        // On Mobile "App Mode", hide window controls to enforce the "App" feel
        if (lockAI && isMobile) {
            if (minimizeBtn) minimizeBtn.style.display = 'none';
            if (resetBtn) resetBtn.style.display = 'none';
        } else {
            if (minimizeBtn) minimizeBtn.style.display = '';
            if (resetBtn) resetBtn.style.display = '';
        }
    }

    // Apply preferences on load
    document.addEventListener('DOMContentLoaded', applyPreferences);

                <div style="display: flex; align-items: center; gap: 5px;">

                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="white-space: nowrap; margin-bottom: 0; font-size: 0.9em;">EC:</label>

                    <label style="margin-bottom: 0; font-size: 0.8em;">Parity:</label>
                    <input type="number" class="ec-parity" min="0" style="width: 40px; flex: none; font-size: 0.9em;">
                </div>
            </div>

        `;
        container.appendChild(div);
    }

             entry.remove();

    function collectEcConfigs(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return null;
        
        const entries = container.querySelectorAll('.ec-entry');
        if (entries.length === 0) return null;
        
        const configs = [];
        let validationError = null;

        entries.forEach(entry => {
             if (validationError) return;

             const key = entry.querySelector('.ec-key').value.trim();
             const data = parseInt(entry.querySelector('.ec-data').value);
             const parity = parseInt(entry.querySelector('.ec-parity').value);
             const pathsRaw = entry.querySelector('.ec-paths').value.trim();
             
             if (!isNaN(data) && !isNaN(parity)) {
                 const item = {
                     key: key,
                     data_chunks: data,
                     parity_chunks: parity,
                     base_paths: [] // Initialize as empty array
                 };
                 if (pathsRaw) {
                     // Updated split regex to include spaces ([\n,\s]+) to handle space-separated paths
                     item.base_paths = pathsRaw.split(/[\n,\s]+/).map(s => s.trim()).filter(s => s.length > 0);
                 }

                 // Validate count matches Data + Parity (User Request: Finish must error if mismatch)
                 const requiredCount = data + parity;
                 if (item.base_paths.length !== requiredCount) {
                     validationError = `Erasure Config Error for '${key}':\nRequired Paths: ${requiredCount} (${data} Data + ${parity} Parity)\nFound Paths: ${item.base_paths.length}\n\nPlease check your path separators (space, comma, or newline).`;
                     return;
                 }

                 configs.push(item);
             }
        });

        if (validationError) {
            showAlert(validationError);
            throw new Error(validationError);
        }
        
        return configs.length > 0 ? configs : null;
    }

</script>
