<script>
    window.onerror = function(message, source, lineno, colno, error) {
        console.error("GLOBAL ERROR CAUGHT:", message, "at", source, ":", lineno, ":", colno);
        return false; // Let default handler run
    };

    /* --- Core Frontend Utilities --- */
    async function apiCall(endpoint, method = 'GET', body = null) {
        try {
            const h = { 'Content-Type': 'application/json' };
            const lStr = localStorage.getItem('sop_ai_config');
            if (lStr) {
                try {
                    const c = JSON.parse(lStr);
                    if(c.brain_provider) h['X-LLM-Provider'] = c.brain_provider;
                    if(c.brain_api_key) h['X-LLM-API-Key'] = c.brain_api_key;
                    if(c.brain_url) h['X-LLM-URL'] = c.brain_url;
                    if(c.brain_model) h['X-LLM-Model'] = c.brain_model;
                    if(c.embedder_provider) h['X-Embedder-Provider'] = c.embedder_provider;
                    if(c.embedder_api_key) h['X-Embedder-API-Key'] = c.embedder_api_key;
                    if(c.embedder_url) h['X-Embedder-URL'] = c.embedder_url;
                    if(c.embedder_model) h['X-Embedder-Model'] = c.embedder_model;
                } catch(e){}
            }

            const options = {
                method: method,
                headers: h
            };
            if (body) {
                options.body = JSON.stringify(body);
            }
            const response = await fetch(endpoint, options);
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API Error (${response.status}): ${text || response.statusText}`);
            }
            const json = await response.json();
            if (json.error) {
                throw new Error(json.error);
            }
            return json;
        } catch (error) {
            console.error(`[API Error] ${method} ${endpoint}:`, error);
            showAlert("Action failed: " + error.message);
            throw error;
        }
    }

    function openUIModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.style.display = 'flex';
        } else {
            console.warn("openUIModal: Modal not found ->", modalId);
        }
    }

    function closeUIModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.style.display = 'none';
        }
    }

    /* --- Global Modal Helpers --- */
    let _confirmCallback = null;
    let _alertCallback = null;

    function showAlert(message, callback, titleText="Alert", titleColor="") {
        const titleEl = document.getElementById('global-alert-title');
        if (titleEl) {
            titleEl.textContent = titleText;
            titleEl.style.color = titleColor || "var(--text-color)";
        }
        document.getElementById('global-alert-message').textContent = message;
        _alertCallback = callback;
        openUIModal('global-alert-modal');
        // Focus OK button for usability
        setTimeout(() => document.getElementById('global-alert-modal').querySelector('button').focus(), 50);
    }

    function closeGlobalAlert() {
        closeUIModal('global-alert-modal');
        if (_alertCallback) {
            _alertCallback();
            _alertCallback = null;
        }
    }

    let _confirmKeyHandler = null;

    function showConfirm(message, onConfirm, onCancel, title="Confirm", okText="OK", cancelText="Cancel") {
        document.getElementById('global-confirm-title').textContent = title;
        document.getElementById('global-confirm-message').textContent = message;
        
        const okBtn = document.getElementById('global-confirm-ok-btn');
        const cancelBtn = document.getElementById('global-confirm-cancel-btn');

        okBtn.textContent = okText;
        cancelBtn.textContent = cancelText;

        // Remove old listeners to avoid stacking
        const newOk = okBtn.cloneNode(true);
        okBtn.parentNode.replaceChild(newOk, okBtn);
        
        const newCancel = cancelBtn.cloneNode(true);
        cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);

        const cleanup = () => {
            closeUIModal('global-confirm-modal');
            if (_confirmKeyHandler) {
                document.removeEventListener('keydown', _confirmKeyHandler, true);
                _confirmKeyHandler = null;
            }
        };

        newOk.onclick = function() {
            cleanup();
            if (onConfirm) onConfirm();
        };

        newCancel.onclick = function() {
            cleanup();
            if (onCancel) onCancel();
        };

        // Keyboard handling
        if (_confirmKeyHandler) document.removeEventListener('keydown', _confirmKeyHandler, true);
        _confirmKeyHandler = function(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                newCancel.click();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                newOk.click();
            }
        };
        document.addEventListener('keydown', _confirmKeyHandler, true);

        openUIModal('global-confirm-modal');
        setTimeout(() => newOk.focus(), 50);
    }

    function closeGlobalConfirm() {
        closeUIModal('global-confirm-modal');
        if (_confirmKeyHandler) {
            document.removeEventListener('keydown', _confirmKeyHandler, true);
            _confirmKeyHandler = null;
        }
    }

    function confirmAsync(message, title="Confirm") {
        return new Promise((resolve) => {
            showConfirm(message, () => resolve(true), () => resolve(false), title);
        });
    }
    
    let _promptKeyHandler = null;

    function showPrompt(message, onConfirm, onCancel, title="Prompt", placeholder="", okText="OK", cancelText="Cancel") {
         document.getElementById('global-prompt-title').textContent = title;
         document.getElementById('global-prompt-message').textContent = message;
         
         const input = document.getElementById('global-prompt-input');
         input.value = "";
         input.placeholder = placeholder;
         
         const okBtn = document.getElementById('global-prompt-ok-btn');
         const cancelBtn = document.getElementById('global-prompt-cancel-btn');

         okBtn.textContent = okText;
         cancelBtn.textContent = cancelText;

         // Remove old listeners
         const newOk = okBtn.cloneNode(true);
         okBtn.parentNode.replaceChild(newOk, okBtn);
         
         const newCancel = cancelBtn.cloneNode(true);
         cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);

         const cleanup = () => {
             closeUIModal('global-prompt-modal');
             if (_promptKeyHandler) {
                 document.removeEventListener('keydown', _promptKeyHandler, true);
                 _promptKeyHandler = null;
             }
         };

         newOk.onclick = function() {
             const val = input.value;
             cleanup();
             if (onConfirm) onConfirm(val);
         };

         newCancel.onclick = function() {
             cleanup();
             if (onCancel) onCancel();
         };

        // Keyboard handling
        if (_promptKeyHandler) document.removeEventListener('keydown', _promptKeyHandler, true);
        _promptKeyHandler = function(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                newCancel.click();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                newOk.click();
            }
        };
        document.addEventListener('keydown', _promptKeyHandler, true);

        openUIModal('global-prompt-modal');
        setTimeout(() => input.focus(), 50);
    }
    
    function promptAsync(message, title="Prompt") {
         return new Promise((resolve) => {
             showPrompt(message, (val) => resolve(val), () => resolve(null), title);
         });
    }
    
    // Override native alert to use our themed custom modal
    window.alert = function(msg) { showAlert(msg); };

    // Escape Key Handler for Modals (KeyDown)
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            const modals = [
                // Topmost Priority
                'global-alert-modal',
                'global-confirm-modal',
                'confirm-modal', 
                
                // Specific Modals
                'preferences-modal', 
                'script-modal', 
                'add-store-modal',
                'store-details-modal',
                'cel-modal',
                'column-modal', 
                'add-modal', 
                
                // Environment/DB Managers
                'delete-env-modal',
                'add-database-modal',
                'delete-database-modal',
                'environments-modal',
                'switch-env-modal',
                
                // Spaces
                'add-kb-modal'
                // NOTE: setup-wizard moved to keyup handler to prevent confirmation dialog conflict
            ];
            
            for (const id of modals) {
                const el = document.getElementById(id);
                // check if the element exists and is visible (display matching flex or block)
                if (el && el.style.display !== 'none' && el.style.display !== '') {
                    
                    event.preventDefault(); 
                    event.stopImmediatePropagation();

                    // Specific close functions handling
                    if (id === 'add-modal') closeAdd();
                    else if (id === 'add-kb-modal') closeAddKBModal();
                    else if (id === 'global-alert-modal') closeGlobalAlert();
                    else if (id === 'global-confirm-modal') closeGlobalConfirm();
                    else if (id === 'preferences-modal') closePreferences();
                    else if (id === 'script-modal') closeScriptModal();
                    else if (id === 'add-store-modal') closeAddStoreModal();
                    else if (id === 'store-details-modal') closeStoreDetailsModal();
                    else if (id === 'cel-modal') closeCelModal();
                    else if (id === 'delete-env-modal') closeDeleteEnvModal();
                    else if (id === 'add-database-modal') closeAddDatabaseModal();
                    else if (id === 'delete-database-modal') closeDeleteDatabaseModal();
                    else if (id === 'environments-modal') closeEnvironmentsManager();
                    else if (id === 'switch-env-modal') closeSwitchEnvModal();
                    else el.style.display = 'none'; // Default fallback
                    
                    return; // Stop processing other modals
                }
            }
        }
    });

    // Dedicated KeyUp Listener for Setup Wizard (prevents double-triggering confirmation)
    document.addEventListener('keyup', function(event) {
        if (event.key === "Escape") {
            const wizard = document.getElementById('setup-wizard');
            if (wizard && wizard.style.display !== 'none' && wizard.style.display !== '') {
                // Ensure no other modal is covering it (simple check)
                 if(document.getElementById('global-alert-modal').style.display === 'flex') return;
                 if(document.getElementById('global-confirm-modal').style.display === 'flex') return;
                 
                 event.preventDefault();
                 event.stopImmediatePropagation();
                 wizardCancel();
            }
        }
    });

    let currentDatabase = null;
    let currentSessionID = "";
    let currentStore = null;
    let firstKey = null;
    let lastKey = null;
    let currentStoreInfo = null;
    let currentItemKey = null;
    
    const CURRENT_CONFIG_FILE = "{{ .ConfigFile }}";

    // Environment Flags
    // ALLOW_INVALID_MAP_KEY: If true, allows saving a store with Map Key type without
    // requiring an Index Specification or CEL Expression. Controlled by SOP_ALLOW_INVALID_MAP_KEY env var.
    const ALLOW_INVALID_MAP_KEY = {{ .AllowInvalidMapKey }};
    const IS_ENTERPRISE = {{ .IsEnterprise }};
    const SYSTEM_DB_NAME = "{{ .SystemDBName }}";
    
    // Dropdown Logic for Enterprise Mode
    function toggleDbDropdown() {
        const menu = document.getElementById('db-dropdown-menu');
        if (menu.style.display === 'block') {
            menu.style.display = 'none';
        } else {
            menu.style.display = 'block';
        }
    }

    // Close Dropdown when clicking outside
    document.addEventListener('click', function(event) {
        const chip = document.getElementById('db-chip');
        const menu = document.getElementById('db-dropdown-menu');
        if (chip && menu && !chip.contains(event.target) && !menu.contains(event.target)) {
            menu.style.display = 'none';
        }
    });

    let currentItems = [];
    let currentKeyColumnWidth = '45%';
    let columnWidths = [];
    let availableDatabases = [];
    const CHIP_ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M5 0a.5.5 0 0 1 .5.5V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2A2.5 2.5 0 0 1 14 4.5h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14a2.5 2.5 0 0 1-2.5 2.5v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14A2.5 2.5 0 0 1 2 11.5H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2A2.5 2.5 0 0 1 4.5 2V.5A.5.5 0 0 1 5 0zm-.5 3A1.5 1.5 0 0 0 3 4.5v7A1.5 1.5 0 0 0 4.5 13h7a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 11.5 3h-7zM5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5v-3z"/></svg>`;

    // Load Databases on Start
    // Refactored into a reusable function to support dynamic database switching
    window.reloadDatabases = function(autoSelect = true) {
        return apiCall('/api/databases')
            .then(databases => {
                availableDatabases = databases;

                // Build a warning alert for missing databases
                let warnings = [];
                if (databases && databases.length > 0) {
                    databases.forEach(db => {
                        if (db.warning) {
                            warnings.push("• " + db.warning);
                        }
                    });
                }
                if (warnings.length > 0) {
                    showAlert("SOP Configuration Missing Database Paths:\n\n" + warnings.join("\n"), null, "Alert", "red");
                }
                
                if (!databases || databases.length === 0) {
                    const select = document.getElementById('database-select');
                    select.innerHTML = '';
                    const opt = document.createElement('option');
                    opt.textContent = "No databases found";
                    select.appendChild(opt);

                    openUIModal('database-section', 'block');
                    
                    // Disable UI elements when no databases exist
                    const btnAddDb = document.getElementById('btn-add-database');
                    if(btnAddDb) {
                        btnAddDb.style.opacity = '0.3';
                        btnAddDb.style.pointerEvents = 'none';
                    }
                    const btnAddStore = document.getElementById('btn-add-store');
                    if(btnAddStore) {
                        btnAddStore.style.opacity = '0.3';
                        btnAddStore.style.pointerEvents = 'none';
                    }
                    const btnChat = document.getElementById('chat-toggle-btn');
                    if(btnChat) {
                        btnChat.style.display = 'none';
                    }
                    
                    // Check if we should suppress the wizard (e.g. redirected after cancel)
                    if (sessionStorage.getItem('sop_suppress_wizard_once')) {
                        sessionStorage.removeItem('sop_suppress_wizard_once');

                        // Check if we also need to open the Environment Manager (Post-Cancel)
                        if (sessionStorage.getItem('sop_open_env_manager')) {
                            sessionStorage.removeItem('sop_open_env_manager');
                            showEnvironmentsManager();
                        }
                        return;
                    }
                    
                    showSetupWizard();
                    return;
                }
                
                openUIModal('database-section', 'block');

                const userDBs = databases.filter(db => !db.is_system);
                const systemDBs = databases.filter(db => db.is_system);

                if (IS_ENTERPRISE) {
                    // Enterprise Mode: Use Chip UI
                    closeUIModal('database-select');
                    openUIModal('enterprise-db-container', 'block');
                    
                    const menu = document.getElementById('db-dropdown-menu');
                    menu.innerHTML = '';
                    
                    // Add User DBs
                    userDBs.forEach(db => {
                        const item = document.createElement('div');
                        item.className = 'db-option';
                        if (db.warning) {
                            item.textContent = `❌ ${db.name} (Missing Database)`;
                            item.style.color = "red";
                            item.style.cursor = "not-allowed";
                            item.onclick = null; // Do nothing if clicked
                        } else {
                            item.textContent = db.name;
                            item.onclick = function() {
                                selectDatabase(db.name);
                                document.getElementById('db-chip-label').textContent = db.name;
                                // User DB: Hide Icon
                                const icon = document.getElementById('db-chip-icon');
                                if (icon) icon.style.display = 'none';
                                toggleDbDropdown();
                            };
                        }
                        menu.appendChild(item);
                    });
                    
                    if (userDBs.length > 0 && systemDBs.length > 0) {
                        const sep = document.createElement('div');
                         sep.style.borderTop = "1px solid var(--border-color)";
                         sep.style.margin = "4px 0";
                         menu.appendChild(sep);
                    }
                    
                    // Add System DBs
                    systemDBs.forEach(db => {
                        const item = document.createElement('div');
                        item.className = 'db-option';
                        item.style.fontWeight = "bold";
                        // item.style.display = "flex"; // Ensure flex via CSS or inline for icon alignment
                        if (db.warning) {
                            item.innerHTML = `<span style="display:inline-flex; align-items:center; gap:6px;">❌ ${db.name} (Missing Database)</span>`;
                            item.style.color = "red";
                            item.style.cursor = "not-allowed";
                            item.onclick = null; // Do nothing if clicked
                        } else {
                            item.innerHTML = `<span style="display:inline-flex; align-items:center; gap:6px;">${CHIP_ICON_SVG} ${db.name}</span>`;
                            item.onclick = function() {
                                selectDatabase(db.name);
                                document.getElementById('db-chip-label').textContent = db.name;
                                 // Toggle icon based on type (System)
                                const icon = document.getElementById('db-chip-icon');
                                if (icon) icon.style.display = 'inline';
                                toggleDbDropdown();
                            };
                        }
                        menu.appendChild(item);
                    });
                    
                } else {
                     // Standard Mode: Use <select>
                     openUIModal('database-select', 'block');
                     closeUIModal('enterprise-db-container');
                     
                    const select = document.getElementById('database-select');
                    select.innerHTML = '';

                    userDBs.forEach(db => {
                        const opt = document.createElement('option');
                        opt.value = db.name;
                        if (db.warning) {
                            opt.textContent = `❌ ${db.name} (Missing Database)`;
                            opt.disabled = true;
                            opt.style.color = "red";
                        } else {
                            opt.textContent = db.name;
                        }
                        select.appendChild(opt);
                    });

                    if (systemDBs.length > 0) {
                        if (userDBs.length > 0) {
                            const separator = document.createElement('option');
                            separator.disabled = true;
                            separator.textContent = "──────────";
                            select.appendChild(separator);
                        }
                        systemDBs.forEach(db => {
                            const opt = document.createElement('option');
                            opt.value = db.name;
                            if (db.warning) {
                                opt.textContent = `❌ ${db.name} (Missing Database)`;
                                opt.disabled = true;
                                opt.style.color = "red";
                            } else {
                                // Standard System Red
                                opt.style.color = "var(--danger-bg)"; 
                                opt.textContent = "⚠️ " + db.name;
                            }
                            opt.className = "option-system";
                            opt.style.fontWeight = "bold";
                            select.appendChild(opt);
                        });
                    }
                }

                if (autoSelect) {
                    // Persistence Logic
                    const savedDB = localStorage.getItem('sop_current_database');
                    const targetDB = databases.find(d => d.name === savedDB);
                    
                    let finalDBVal = null;

                    if (targetDB) {
                        finalDBVal = targetDB.name;
                    } else if (userDBs.length > 0) {
                        finalDBVal = userDBs[0].name;
                    } else if (systemDBs.length > 0) {
                        finalDBVal = systemDBs[0].name;
                    }
                    
                    if (finalDBVal) {
                         selectDatabase(finalDBVal);
                         // Update UI States
                         if (IS_ENTERPRISE) {
                             let label = finalDBVal;
                             const finalDB = databases.find(d => d.name === finalDBVal);
                             document.getElementById('db-chip-label').textContent = label;
                             
                             // Toggle Icon for Initial Load
                             const icon = document.getElementById('db-chip-icon');
                             if (icon) {
                                 icon.style.display = (finalDB && finalDB.is_system) ? 'inline' : 'none';
                             }
                         } else {
                             document.getElementById('database-select').value = finalDBVal;
                         }
                    }
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('database-select').innerHTML = '<option>Error loading databases</option>';
                openUIModal('database-section', 'block');
            });
    };

    // Initial Load
    reloadDatabases(true).then(() => {
        // Initialization handled during setup wizard now
    });

    async function selectDatabase(name, forceRefresh = false, storeToSelect = null) {
        if (!forceRefresh && currentDatabase === name) return;

        // Check for unsaved changes
        if (!await closeDetail()) {
            // Revert selection
            const select = document.getElementById('database-select');
            if (select && currentDatabase) {
                select.value = currentDatabase;
            }
            return;
        }

        currentDatabase = name;
        localStorage.setItem('sop_current_database', name);

        // Hardening: Hide Add Store button for System DB / System DBs
        const dbObj = availableDatabases.find(d => d.name === name);
        const btnAddStore = document.getElementById('btn-add-store');
        // Define isSystemDB locally so we can reuse it in the store listing
        const isSystemDB = (dbObj && dbObj.is_system) || name === 'system' || name === SYSTEM_DB_NAME;

        if (btnAddStore) {
            // Check implicit system names too just in case is_system missing
            if (isSystemDB) {
                 btnAddStore.style.display = 'none';
            } else {
                 btnAddStore.style.display = 'inline-block';
            }
        }

        currentStore = null;
        document.getElementById('store-list').innerHTML = '<li>Loading...</li>';
        document.getElementById('current-store-title').textContent = 'Select Store or Context Space';
        
        // Hide all store-specific buttons
        closeUIModal('btn-delete-store');
        closeUIModal('btn-code-store');
        closeUIModal('btn-edit-store');
        closeUIModal('btn-view-store');
        closeUIModal('btn-edit-cel');
        closeUIModal('btn-edit-kb');
        closeUIModal('btn-export-kb');
        closeUIModal('btn-import-kb');
        closeUIModal('btn-delete-kb');
        closeUIModal('btn-add-kb-category');

        document.getElementById('data-grid').innerHTML = '';
        closeUIModal('toolbar');
        closeUIModal('pagination');
        closeUIModal('pagination-top');
        
        // Reset DB Options
        document.getElementById('db-options-section').style.display = 'none';
        document.getElementById('db-options-content').innerHTML = 'Loading...';
        
        fetch(`/api/stores?database=${encodeURIComponent(name)}`)
            .then(res => res.json())
            .then(stores => {
                const list = document.getElementById('store-list');
                list.innerHTML = '';
                if (!stores || stores.length === 0) {
                    list.innerHTML = '<li>No stores found</li>';
                    return;
                }
                stores.forEach(store => {
                    const li = document.createElement('li');
                    li.textContent = store.charAt(0).toUpperCase() + store.slice(1);
                    li.onclick = () => selectStore(store, li);
                    list.appendChild(li);

                    if (storeToSelect && store === storeToSelect) {
                        selectStore(store, li);
                    }
                });
            })
            .catch(err => {
                const list = document.getElementById('store-list');
                list.innerHTML = `<li class="error-text">Error: ${err.message}</li>`;
            });

        // Fetch Spaces
        fetch(`/api/spaces?database=${encodeURIComponent(name)}&session_id=${encodeURIComponent(currentSessionID)}`)
            .then(res => res.json())
            .then(kbs => {
                const kbList = document.getElementById('kb-list');
                const domainSelect = document.getElementById('domain-select');
                
                kbList.innerHTML = '';
                
                if (domainSelect) {
                    Array.from(domainSelect.options).forEach(opt => {
                        if (opt.getAttribute('data-dynamic') === 'true') {
                            domainSelect.removeChild(opt);
                        }
                    });
                }
                
                if (!kbs || kbs.length === 0) {
                    kbList.innerHTML = '<li>No Spaces found</li>';
                    return;
                }
                kbs.forEach(kb => {
                    const li = document.createElement('li');
                    li.textContent = kb.charAt(0).toUpperCase() + kb.slice(1);
                    li.onclick = () => selectSpace(kb, li);
                    kbList.appendChild(li);
                    
                    if (storeToSelect && kb === storeToSelect) {
                        setTimeout(() => selectSpace(kb, li), 50);
                    }
                    
                    if (domainSelect) {
                        const existing = Array.from(domainSelect.options).find(o => o.value === kb);
                        if (!existing) {
                            const opt = document.createElement('option');
                            opt.value = kb;
                            opt.textContent = kb.charAt(0).toUpperCase() + kb.slice(1);
                            opt.setAttribute('data-dynamic', 'true');
                            domainSelect.appendChild(opt);
                        }
                    }
                });
            })
            .catch(err => {
                const kbList = document.getElementById('kb-list');
                kbList.innerHTML = `<li class="error-text">Error: ${err.message}</li>`;
            });

        // Fetch DB Options
        fetch(`/api/db/options?database=${encodeURIComponent(name)}`)
            .then(res => res.json())
            .then(opts => {
                const section = document.getElementById('db-options-section');
                const content = document.getElementById('db-options-content');
                section.style.display = 'block';
                
                let html = '';
                
                // Display Mode (Type)
                // L2CacheType: 2=Redis (Clustered), others (0=NoCache, 1=InMemory) = Standalone
                const typeStr = (opts.cache_type === 2) ? "Clustered" : "Standalone";
                html += `<div style="margin-bottom: 5px;"><strong>Type:</strong> ${typeStr}</div>`;

                if (opts.stores_folders && opts.stores_folders.length > 0) {
                    html += '<strong>Stores Folders:</strong><ul style="margin: 0; padding-left: 20px; list-style-type: disc;">';
                    opts.stores_folders.forEach(f => {
                        // Shorten path logic:
                        // Only shorten if length > 27 characters
                        let shortPath = f;
                        if (f.length > 27) {
                            // Split by / or \
                            const parts = f.split(/[/\\]/).filter(p => p.length > 0);
                            if (parts.length > 2) {
                                shortPath = '../' + parts[parts.length - 2] + '/' + parts[parts.length - 1];
                            }
                        }
                        
                        // Escape for JS string
                        const safePath = f.replace(/\\/g, '\\\\').replace(/\u0027/g, "\\'");
                        
                        html += `<li style="cursor: copy; padding: 2px 0;" 
                                     title="${f} (Click to Copy)"
                                     onclick="navigator.clipboard.writeText('${safePath}').then(() => { const el = this; const orig = el.style.color; el.style.color = '#4caf50'; setTimeout(() => el.style.color = orig, 500); });">
                                    ${shortPath}
                                 </li>`;
                    });
                    html += '</ul>';
                }
                
                if (opts.erasure_config && Object.keys(opts.erasure_config).length > 0) {
                    html += '<details><summary style="cursor: pointer; font-weight: bold; margin-bottom: 5px;">Erasure Config</summary><pre style="margin: 0; font-size: 10px; overflow-x: visible;">' + JSON.stringify(opts.erasure_config, null, 2) + '</pre></details>';
                }

                if (opts.redis_config) {
                    html += '<details><summary style="cursor: pointer; font-weight: bold; margin-bottom: 5px;">Redis Config</summary><pre style="margin: 0; font-size: 10px; overflow-x: visible;">' + JSON.stringify(opts.redis_config, null, 2) + '</pre></details>';
                }
                
                if (!html) {
                    html = 'No specific options found.';
                }
                content.innerHTML = html;
            })
            .catch(err => {
                console.error("Failed to fetch DB options", err);
                document.getElementById('db-options-content').innerHTML = '<span class="error-text">Failed to load options</span>';
                document.getElementById('db-options-section').style.display = 'block';
            });
    }

    function isSpaceReadOnly(spaceName, databaseName) {
        if (!spaceName) return false;
        
        // System DB check
        const dbObj = availableDatabases && databaseName ? availableDatabases.find(d => d.name === databaseName) : null;
        const isSystem = (dbObj && dbObj.is_system) || databaseName === 'system' || databaseName === SYSTEM_DB_NAME;

        // Current rule: SOP and LongTermMemory (memory_...) KBs are read-only in System DB
        if (isSystem && (spaceName.startsWith('memory_') || spaceName === 'SOP/data' || spaceName === 'SOP' || spaceName === 'Medical')) {
            return true;
        }
        
        return false;
    }

    function isStoreReadOnly(info) {
        if (!info) return true;
        
        // Check System DB status
        const dbObj = availableDatabases && currentDatabase ? availableDatabases.find(d => d.name === currentDatabase) : null;
        const isSystem = (dbObj && dbObj.is_system) || currentDatabase === 'system' || currentDatabase === SYSTEM_DB_NAME;

        // Protected Stores
        const storeName = info.name || currentStore;
        if (storeName === 'llm_feedback') return true;

        if (isSpaceReadOnly(storeName, currentDatabase)) return true;

        const hasIndex = info.indexSpec && info.indexSpec.index_fields && info.indexSpec.index_fields.length > 0;
        const hasCel = !!info.celExpression;
        const isPrimitiveMetadata = info.isPrimitiveKey;
        
        let isPrimitiveData = false;
        if (info.count > 0 && info.sampleKey !== undefined && info.sampleKey !== null) {
             const t = typeof info.sampleKey;
             if (t !== 'object' || Array.isArray(info.sampleKey)) {
                 isPrimitiveData = true;
             }
        }
        
        const hasSchema = hasIndex || hasCel || isPrimitiveMetadata || isPrimitiveData;
        return !hasSchema;
    }

                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3z"/>
                            </svg>
                        </span>
                    </div>
                    
                    <ul id="kb-category-tree" style="list-style: none; padding-left: 0; margin-top: 0; font-size: 0.95em;">
                    </ul>
                </div>

                <!-- Right Side Grid -->
                <div style="flex: 1; display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding-right: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: var(--bg-color); z-index: 10; overflow: hidden;">
                        <h3 id="kb-items-header-title" style="margin: 0; font-size: 1.1em; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px;">All Items</h3>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <select id="items-per-page-select" onchange="window._currentLimit = parseInt(this.value); if(window._lastFetchItemsArgs) { window.fetchItemsForCategory(window._lastFetchItemsArgs.spaceName, window._lastFetchItemsArgs.categoryId, window._lastFetchItemsArgs.categoryName, window._lastFetchItemsArgs.liElement, window._lastFetchItemsArgs.catObj, 0, window._currentLimit); }" style="padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); font-size: 0.85em; cursor: pointer; outline: none;">
                                <option value="10" ${window._currentLimit === 10 ? 'selected' : ''}>10 / page</option>
                                <option value="25" ${window._currentLimit === 25 ? 'selected' : ''}>25 / page</option>
                                <option value="50" ${window._currentLimit === 50 ? 'selected' : ''}>50 / page</option>
                                <option value="100" ${window._currentLimit === 100 ? 'selected' : ''}>100 / page</option>
                                <option value="500" ${window._currentLimit === 500 ? 'selected' : ''}>500 / page</option>
                            </select>
                            ${actionButtons}
                        </div>
                    </div>
                    <div id="kb-items-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; align-content: flex-start; padding-bottom: 20px;">
                        <div style="padding: 15px;">Please select a category.</div>
                    </div>
                </div>
            </div>
        `;

        grid.innerHTML = html;

        // Recursively render tree
        const treeRoot = document.querySelector('#kb-category-tree');
        function renderTreeNodes(catList, container, depth=0) {
            catList.forEach(cat => {
                const li = document.createElement('li');
                li.style.marginBottom = '8px';
                li.style.marginLeft = (depth > 0 ? 15 : 0) + 'px';
                li.style.cursor = 'pointer';
                li.style.color = 'var(--text-color)';
                li.style.padding = '4px';
                li.style.borderRadius = '4px';
                li.style.display = 'flex';
                li.style.justifyContent = 'space-between';
                li.style.alignItems = 'center';
                
                li.onmouseover = () => li.style.background = 'rgba(0,0,0,0.03)';
                li.onmouseout = () => li.style.background = 'transparent';
                
                li.onclick = (e) => {
                    e.stopPropagation();
                    window.fetchItemsForCategory(name, cat.id, cat.name, li, cat);
                };

                const titleSpan = document.createElement('span');
                const hasChildren = childrenMap[cat.id] && childrenMap[cat.id].length > 0;
                titleSpan.innerHTML = (hasChildren ? '▾ ' : '◦ ') + cat.name;
                titleSpan.style.whiteSpace = 'nowrap';
                titleSpan.style.overflow = 'hidden';
                titleSpan.style.textOverflow = 'ellipsis';
                titleSpan.title = cat.name;

                const titleContainer = document.createElement('div');
                titleContainer.style.display = 'flex';
                titleContainer.style.alignItems = 'center';
                titleContainer.style.overflow = 'hidden';
                titleContainer.appendChild(titleSpan);

                li.appendChild(titleContainer);
                
                container.appendChild(li);

                if (hasChildren) {
                    const ul = document.createElement('ul');
                    ul.style.listStyle = 'none';
                    ul.style.paddingLeft = '0';
                    ul.style.marginTop = '5px';
                    renderTreeNodes(childrenMap[cat.id], ul, depth+1);
                    container.appendChild(ul);
                }
            });
        }
        
        if (roots.length > 0) {
            renderTreeNodes(roots.sort((a,b) => a.name.localeCompare(b.name)), treeRoot);
        }
        
        // Category Pagination UI
        const totalCatPages = Math.ceil(totalCatCount / catLimit);
        const currentCatPage = Math.floor(catOffset / catLimit) + 1;
        if (totalCatPages > 1) {
            let pHtml = `<div style="display: flex; gap: 5px; margin-top: 15px; align-items: center; justify-content: center; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid var(--border-color);">`;
            
            if (currentCatPage > 1) {
                pHtml += `<button onclick="window.selectSpace('${name}', document.querySelector('#sidebar li.active'), false, ${catOffset - catLimit}, ${catLimit})" style="padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--button-bg); color: var(--text-color); cursor: pointer;">&lt;</button>`;
            }
            
            let sPage = Math.max(1, currentCatPage - 1);
            let ePage = Math.min(totalCatPages, currentCatPage + 1);
            
            if (sPage > 1) {
                pHtml += `<button onclick="window.selectSpace('${name}', document.querySelector('#sidebar li.active'), false, 0, ${catLimit})" style="padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--button-bg); color: var(--text-color); cursor: pointer;">1</button>`;
                if (sPage > 2) pHtml += `<span style="font-size: 0.85em; color: var(--text-muted);">..</span>`;
            }
            
            for (let i = sPage; i <= ePage; i++) {
                const isC = i === currentCatPage;
                const poff = (i - 1) * catLimit;
                const st = isC 
                    ? `padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid #5b6ed1; background: #5b6ed1; color: white; cursor: default;`
                    : `padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--button-bg); color: var(--text-color); cursor: pointer;`;
                
                pHtml += `<button ${!isC ? `onclick="window.selectSpace('${name}', document.querySelector('#sidebar li.active'), false, ${poff}, ${catLimit})"` : ''} style="${st}">${i}</button>`;
            }
            
            if (ePage < totalCatPages) {
                if (ePage < totalCatPages - 1) pHtml += `<span style="font-size: 0.85em; color: var(--text-muted);">..</span>`;
                pHtml += `<button onclick="window.selectSpace('${name}', document.querySelector('#sidebar li.active'), false, ${(totalCatPages - 1) * catLimit}, ${catLimit})" style="padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--button-bg); color: var(--text-color); cursor: pointer;">${totalCatPages}</button>`;
            }

            if (currentCatPage < totalCatPages) {
                pHtml += `<button onclick="window.selectSpace('${name}', document.querySelector('#sidebar li.active'), false, ${catOffset + catLimit}, ${catLimit})" style="padding: 2px 6px; font-size: 0.85em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--button-bg); color: var(--text-color); cursor: pointer;">&gt;</button>`;
            }
            
            pHtml += `</div>`;
            const pagingWrap = document.createElement('div');
            pagingWrap.innerHTML = pHtml;
            treeRoot.parentNode.appendChild(pagingWrap);
        }

        window.fetchItemsForCategory = async function(spaceName, categoryId, categoryName, liElement, catObj, offset = 0, limit = (window._currentLimit || 50)) {
            window._lastFetchItemsArgs = { spaceName, categoryId, categoryName, liElement, catObj, offset, limit };
            window._currentSelectedCategoryName = categoryName;
            document.querySelectorAll('#kb-category-tree li').forEach(li => {
                li.style.fontWeight = 'normal';
                li.style.color = 'var(--text-color)';
                const strong = li.querySelector('strong');
                if (strong) strong.style.fontWeight = 'normal';
            });
            if (liElement) {
                liElement.style.color = 'var(--link-color)';
                const strong = liElement.querySelector('strong');
                if (strong) strong.style.fontWeight = 'bold';
                else liElement.style.fontWeight = 'bold';
            }

            const headerTitle = document.getElementById('kb-items-header-title');
            headerTitle.innerHTML = '';
            headerTitle.appendChild(document.createTextNode(categoryId ? 'Items in: ' + categoryName : 'All Items'));

            if (!isReadOnlyKB) {
                // Determine if DB allows adding items (mostly System DB logic mirroring selectStore)
                let allowAdd = true;
                const currentDbObj = availableDatabases.find(db => db.name === currentDatabase);
                const isSystemDB = currentDbObj ? currentDbObj.is_system : false;
                
                if (currentStore === 'llm_feedback' || (isSystemDB && currentStore === 'memory')) {
                    allowAdd = false;
                }

                // ADD CATEGORY ICON (+)
                const addCatBtn = document.createElement('span');
                addCatBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>';
                addCatBtn.title = 'Add Category';
                addCatBtn.style.fontSize = '1.1em';
                addCatBtn.style.marginLeft = '10px';
                addCatBtn.style.cursor = 'pointer';
                addCatBtn.style.color = 'var(--text-color)';
                addCatBtn.style.opacity = '0.5';
                addCatBtn.style.verticalAlign = 'middle';
                addCatBtn.style.display = 'inline-flex';
                addCatBtn.style.alignItems = 'center';
                addCatBtn.onmouseover = () => addCatBtn.style.opacity = '1';
                addCatBtn.onmouseout = () => addCatBtn.style.opacity = '0.5';
                addCatBtn.onclick = (e) => {
                    e.stopPropagation();
                    window.showAddCategoryModal();
                };
                headerTitle.appendChild(addCatBtn);

                if (categoryId && catObj) {
                    const editBtn = document.createElement('span');
                    editBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>';
                    editBtn.title = 'Edit Category';
                    editBtn.style.fontSize = '1em';
                    editBtn.style.marginLeft = '10px';
                    editBtn.style.cursor = 'pointer';
                    editBtn.style.color = 'var(--text-color)';
                    editBtn.style.verticalAlign = 'middle';
                    editBtn.style.display = 'inline-flex';
                    editBtn.style.alignItems = 'center';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        window.editCategoryModal(catObj, spaceName);
                    };
                    headerTitle.appendChild(editBtn);

                    const delBtn = document.createElement('span');
                    delBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>';
                    delBtn.title = 'Delete Category (' + categoryName + ')';
                    delBtn.style.fontSize = '1em';
                    delBtn.style.marginLeft = '10px';
                    delBtn.style.cursor = 'pointer';
                    delBtn.style.color = 'var(--text-color)';
                    delBtn.style.verticalAlign = 'middle';
                    delBtn.style.display = 'inline-flex';
                    delBtn.style.alignItems = 'center';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm('Are you sure you want to delete the category "' + categoryName + '"? This cannot be undone.')) {
                            window.deleteCategory(catObj.id, spaceName);
                        }
                    };
                    headerTitle.appendChild(delBtn);
                }

// UI logic for Add Item button used to be here, moved back to actionButtons render logic.
            }

            const tg = document.getElementById('kb-items-grid');
            tg.innerHTML = "<div style='padding: 15px;'>Loading items...</div>";

            try {
                let url = `/api/spaces/items?database=${encodeURIComponent(currentDatabase)}&name=${encodeURIComponent(spaceName)}&offset=${offset}&limit=${limit}`;
                if (categoryId) url += `&category_id=${encodeURIComponent(categoryId)}`;
                
                const res = await fetch(url);
                if (!res.ok) throw new Error("Failed to fetch items");
                
                let resPayload = null;
                try {
                	resPayload = await res.json();
                } catch(e){}
                
                let items = resPayload ? resPayload.data || [] : [];
                window._lastSpaceItems = items;
                let totalCount = resPayload ? resPayload.total || items.length : items.length;
                if (!items || items.length === 0) {
                    tg.innerHTML = "<div style='padding: 15px;'>No items found.</div>";
                    return;
                }

                let contentHtml = '';
                items.forEach(t => {
                    let fullDesc = t.description || t.text || "";
                    let isLongDesc = fullDesc.length > 150;
                    let shortDesc = isLongDesc ? fullDesc.substring(0, 150) + "..." : fullDesc;

                    let vectorCount = t.vector ? t.vector.length : 0;
                    let vectorBox = "";
                    if(vectorCount > 0) {
                        vectorBox = `
                            <div style="margin-left: auto;">

                                </a>
                                <div class="vector-array-box" style="display:none; font-size:0.9em; text-align: left; background:var(--input-bg); color:var(--text-color); margin-top:5px; padding:5px; border-radius:4px; max-height:80px; overflow-y:auto; word-break:break-all; border:1px solid var(--border-color); position: absolute; max-width: 250px; right: 0; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">

                                </div>
                            </div>
                        `;
                    }

                    let currCatName = (categoryName === 'All Items' && t.category && t.category !== "<nil>") ? t.category : (categoryName || '');
                    if (categoryName !== 'All Items' && window._currentKBCategories) {
                        let catObj = window._currentKBCategories.find(c => c.id === (t.category_id || t.category));
                        if(catObj && catObj.name) {
                            currCatName = catObj.name;
                        }
                    }
                    let descHtml = '';
                    if (isLongDesc) {
                        descHtml = `
                            <div class="item-content-wrapper" style="flex: 1; display: flex; flex-direction: column;">
                                <div style="flex: 1;">
                                    <span class="desc-short">${shortDesc}</span>
                                    <span class="desc-full" style="display:none; white-space:pre-wrap;">${fullDesc.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                </div>
                                <div style="margin-top: 8px; display: flex; align-items: center; position: relative;">
                                    <a href="javascript:void(0)" class="read-more-btn" onclick="toggleDomainItemDesc(this)" data-item-id="${t.id}" data-item-category="${t.category_id || t.category || ''}" style="color:var(--link-color); font-size:0.85em; text-decoration:underline;">Read More</a>
                                    ${isReadOnlyKB ? 
                                        `<a href="javascript:void(0)" class="edit-item-btn" onclick="editDomainItemInline(this, '${t.id}', '${t.category_id || t.category || ''}', '${currCatName.replace(/\u0027/g, "&apos;")}', '${(t.summaries ? t.summaries.join('. ').replace(/\u0027/g, "&apos;").replace(/"/g, "&quot;").replace(/\\n/g, " ") : '')}')" style="color:var(--link-color); font-size:0.85em; text-decoration:underline; margin-left: 15px;" title="View Details">View Details</a>` 
                                        : 
                                        `<a href="javascript:void(0)" class="edit-item-btn" onclick="editDomainItemInline(this, '${t.id}', '${t.category_id || t.category || ''}', '${currCatName.replace(/\u0027/g, "&apos;")}', '${(t.summaries ? t.summaries.join('. ').replace(/\u0027/g, "&apos;").replace(/"/g, "&quot;").replace(/\\n/g, " ") : '')}')" style="color:var(--text-color); margin-left: 15px; display: inline-flex; align-items: center;" title="Edit Item"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg></a>
                                         <a href="javascript:void(0)" class="delete-item-btn" onclick="window.deleteSpaceItem('${t.id}', '${((t.summaries && t.summaries.length > 0) ? t.summaries[0] : (t.text || t.description || t.topic || t.concept || t.name || t.id)).substring(0, 100).replace(/\u0027/g, "&apos;")}')" style="color:var(--text-color); margin-left: 15px; display: inline-flex; align-items: center;" title="Delete Item"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg></a>`
                                    }
                                    ${vectorBox}
                                </div>
                            </div>
                        `;
                    } else {
                        descHtml = `
                            <div class="item-content-wrapper" style="flex: 1; display: flex; flex-direction: column;">
                                <div style="flex: 1;">
                                    <span class="desc-short" style="display:none;">${shortDesc}</span>
                                    <span class="desc-full" style="display:inline; white-space:pre-wrap;">${fullDesc.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                </div>
                                <div style="margin-top: 8px; display: flex; align-items: center; position: relative;">
                                    ${isReadOnlyKB ? 
                                        `<a href="javascript:void(0)" class="edit-item-btn" onclick="editDomainItemInline(this, '${t.id}', '${t.category_id || t.category || ''}', '${currCatName.replace(/\u0027/g, "&apos;")}', '${(t.summaries ? t.summaries.join('. ').replace(/\u0027/g, "&apos;").replace(/"/g, "&quot;").replace(/\\n/g, " ") : '')}')" style="color:var(--link-color); font-size:0.85em; text-decoration:underline; display: inline-flex; align-items: center;" title="View Details">View Details</a>` 
                                        :
